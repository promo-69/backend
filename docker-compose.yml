services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
            target: ${NODE_ENV:-development}
        container_name: cineflix-api
        restart: always
        volumes:
            - ./src:/app/src
        expose:
            - '4000'
        ports:
            - '4000:4000'
        depends_on:
            - db
            - redis
        env_file:
            - .env
        environment:
            - NODE_OPTIONS=--dns-result-order=ipv4first
            - RUNNING_IN_DOCKER=true
            - IS_DOCKER=true
            - DB_POSTGRESQL_MAIN_HOST=db
            - DB_POSTGRESQL_MAIN_PORT=5432
            - NPM_CONFIG_UPDATE_NOTIFIER=false
        networks:
            - cineflix-network

    nginx:
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile
        container_name: cineflix-nginx
        restart: always
        depends_on:
            - api
        networks:
            - cineflix-network
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./docker/nginx/default.local.conf:/etc/nginx/conf.d/default.conf:ro
            - ./docker/nginx/entrypoint.local.sh:/docker-entrypoint.d/99-entrypoint.local.sh:ro
            - nginx_certs:/etc/nginx/certs

    db:
        image: postgres:15-alpine
        container_name: cineflix-main-db
        restart: always
        environment:
            - POSTGRES_USER=${DB_POSTGRESQL_MAIN_USERNAME}
            - POSTGRES_PASSWORD=${DB_POSTGRESQL_MAIN_PASSWORD}
            - POSTGRES_DB=${DB_POSTGRESQL_MAIN_DATABASE}
        env_file:
            - .env
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - '${DB_POSTGRESQL_MAIN_PORT}:5432'
        networks:
            - cineflix-network

    redis:
        image: redis:alpine
        container_name: cineflix-redis
        restart: always
        ports:
            - '6379:6379'
        networks:
            - cineflix-network

volumes:
    pgdata:
    nginx_certs:

networks:
    cineflix-network:
        driver: bridge
