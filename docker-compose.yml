services:
    db:
        image: postgres:15-alpine
        container_name: cineflix-db
        environment:
            POSTGRES_USER: ${DB_POSTGRESQL_MAIN_USERNAME}
            POSTGRES_PASSWORD: ${DB_POSTGRESQL_MAIN_PASSWORD}
            POSTGRES_DB: ${DB_POSTGRESQL_MAIN_DATABASE}
        env_file:
            - .env
        volumes:
            - pgdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        container_name: cineflix-redis

    api:
        build: .
        container_name: cineflix-api
        env_file:
            - .env
        volumes:
            - .:/app
            - /app/node_modules
        depends_on:
            - db
            - redis
        ports:
            - '4000:4000'

    nginx:
        image: nginx:alpine
        container_name: cineflix-nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./docker/nginx/certs:/etc/nginx/certs:ro
        depends_on:
            - api

volumes:
    pgdata:
