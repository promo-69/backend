/price-modifiers:
    get:
        summary: List Price Modifiers
        description: Retrieve a list of active price modifier rules.
        tags:
            - Price Modifiers
        security:
            - bearerAuth: []
        responses:
            '200':
                description: Price modifiers retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            description:
                                                type: string
                                            modifier_scope:
                                                type: integer
                                            operation_type:
                                                type: integer
                                            is_percentage:
                                                type: boolean
                                            value:
                                                type: number
                                            audience_category:
                                                type: integer
                                                nullable: true
                                            week_day:
                                                type: integer
                                                nullable: true
                                            seat_category:
                                                type: integer
                                                nullable: true
                                            projection_type:
                                                type: integer
                                                nullable: true
                                            product_category:
                                                type: integer
                                                nullable: true
                                            product:
                                                type: integer
                                                nullable: true
                                            combo:
                                                type: integer
                                                nullable: true
                                            cinema:
                                                type: integer
                                                nullable: true
                                            start_date:
                                                type: string
                                                format: date
                                                nullable: true
                                            end_date:
                                                type: string
                                                format: date
                                                nullable: true
                                            start_time:
                                                type: string
                                                nullable: true
                                            end_time:
                                                type: string
                                                nullable: true
                                            line_type:
                                                type: integer
                                                nullable: true
                                            booking_type:
                                                type: integer
                                                nullable: true
                                            movie:
                                                type: integer
                                                nullable: true
                                            room_type:
                                                type: integer
                                                nullable: true
                                            currency:
                                                type: integer
                                                nullable: true
                                            target_currency:
                                                type: integer
                                                nullable: true
                                            target_currency_condition:
                                                type: boolean
                                                nullable: true
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Price Modifier
        description: |
            Create a pricing rule that applies a discount or surcharge to ticket or concession prices.
            The fields allowed depend on the modifier scope:
            - scope 1 (Ticketing): `audienceCategory`, `weekDay`, `seatCategory`, `projectionType` are valid. `productCategory`, `product`, `combo` must be omitted.
            - scope 2 (Concessions): `productCategory`, `product`, `combo` are valid. `audienceCategory`, `seatCategory`, `projectionType` must be omitted.
            - scope 3 (Global): all optional qualifier fields must be omitted.
        tags:
            - Price Modifiers
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - description
                            - modifierScope
                            - operationType
                            - isPercentage
                            - value
                        properties:
                            description:
                                type: string
                                example: Tuesday discount
                            modifierScope:
                                type: integer
                                enum: [1, 2, 3]
                                example: 1
                            operationType:
                                type: integer
                                example: 2
                            isPercentage:
                                type: boolean
                                example: true
                            value:
                                type: number
                                example: 20
                            audienceCategory:
                                type: integer
                                nullable: true
                            weekDay:
                                type: integer
                                minimum: 1
                                maximum: 7
                                nullable: true
                                example: 3
                            cinema:
                                type: integer
                                nullable: true
                            startDate:
                                type: string
                                format: date
                                nullable: true
                                example: '2026-06-01'
                            endDate:
                                type: string
                                format: date
                                nullable: true
                                example: '2026-06-30'
                            startTime:
                                type: string
                                nullable: true
                                example: '09:00:00'
                            endTime:
                                type: string
                                nullable: true
                                example: '23:00:00'
                            lineType:
                                type: integer
                                nullable: true
                            bookingType:
                                type: integer
                                nullable: true
                            movie:
                                type: integer
                                nullable: true
                            roomType:
                                type: integer
                                nullable: true
                            currency:
                                type: integer
                                nullable: true
                            targetCurrency:
                                type: integer
                                nullable: true
                            targetCurrencyCondition:
                                type: boolean
                                nullable: true
                            seatCategory:
                                type: integer
                                nullable: true
                            projectionType:
                                type: integer
                                nullable: true
                            productCategory:
                                type: integer
                                nullable: true
                            product:
                                type: integer
                                nullable: true
                            combo:
                                type: integer
                                nullable: true
        responses:
            '201':
                description: Price modifier created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        description:
                                            type: string
            '400':
                description: Bad request (validation errors or scope constraint violation)
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
