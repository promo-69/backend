/price-modifiers:
    post:
        summary: Crear una regla de precio (descuento/recargo)
        description: |
            Registra un nuevo modificador de precio (promoción, recargo, evento especial) que puede aplicarse a boletos, productos o globalmente.
            Requiere rol de administrador (`SUPER_ADMIN` o `CINEMA_MANAGER`).
        tags:
            - Price Modifiers
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - description
                            - modifier_scope
                            - operation_type
                            - is_percentage
                            - value
                        properties:
                            description:
                                type: string
                                description: Nombre o descripción de la regla
                            modifier_scope:
                                type: integer
                                description: |
                                    Alcance de la regla:
                                    * `1` – Boletería (aplica a boletos)
                                    * `2` – Dulcería (aplica a productos de confitería)
                                    * `3` – Global (aplica a todo)
                                enum: [1, 2, 3]
                            operation_type:
                                type: integer
                                description: |
                                    Tipo de operación:
                                    * `1` – Descuento
                                    * `2` – Recargo
                                enum: [1, 2]
                            is_percentage:
                                type: boolean
                                description: Si el valor es porcentaje (true) o monto fijo (false)
                            value:
                                type: number
                                format: float
                                description: Monto o porcentaje (positivo). Si es porcentaje, no puede superar 100.
                            audience_category:
                                type: integer
                                description: ID de categoría de público (solo para scope 1)
                            week_day:
                                type: integer
                                description: ID de día de semana (1=Lunes, …, 7=Domingo)
                            seat_category:
                                type: integer
                                description: ID de categoría de asiento (solo para scope 1)
                            projection_type:
                                type: integer
                                description: ID de tipo de proyección (solo para scope 1)
                            product_category:
                                type: integer
                                description: ID de categoría de producto (solo para scope 2)
                            product:
                                type: integer
                                description: ID de producto específico (solo para scope 2)
                            combo:
                                type: integer
                                description: ID de combo (solo para scope 2)
        responses:
            '201':
                description: Regla creada exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: |
                    Error de validación. Puede deberse a:
                    - Campos obligatorios faltantes
                    - Valor no positivo o porcentaje > 100
                    - Alcance inválido
                    - Campos prohibidos según el alcance (ej. enviar `product_category` con scope=1)
            '401':
                description: No autorizado (token inválido o faltante)
            '403':
                description: Permisos insuficientes (no es administrador)
            '500':
                description: Error interno del servidor

/price-modifiers/{id}:
    put:
        summary: Actualizar una regla de precio existente
        description: |
            Modifica los valores de una regla (descripción, valor, tipo de operación, etc.). No permite cambiar el alcance ni los campos de relación (ej. projection_type).
            Requiere rol de administrador.
        tags:
            - Price Modifiers
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la regla de precio
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            description:
                                type: string
                                description: Nueva descripción
                            value:
                                type: number
                                format: float
                                description: Nuevo valor (positivo). Si la regla es porcentual, no puede superar 100.
                            is_percentage:
                                type: boolean
                                description: Cambiar a porcentaje o monto fijo
                            operation_type:
                                type: integer
                                description: Cambiar tipo de operación (1=descuento, 2=recargo)
        responses:
            '200':
                description: Regla actualizada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: Error de validación (campo vacío, valor inválido, etc.)
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Regla no encontrada
            '500':
                description: Error interno

    delete:
        summary: Desactivar una regla de precio (soft delete)
        description: Marca la regla como eliminada lógicamente (status=4). Requiere rol `SUPER_ADMIN`.
        tags:
            - Price Modifiers
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Regla desactivada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Regla no encontrada
            '500':
                description: Error interno

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
