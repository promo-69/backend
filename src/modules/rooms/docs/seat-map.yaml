/rooms/{id}/seats:
    get:
        summary: Get Seat Map
        description: Retrieve the complete seat layout of a room.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Seat map retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            room:
                                                type: integer
                                            row_identifier:
                                                type: string
                                            column_number:
                                                type: integer
                                            seat_category:
                                                type: integer
                                            seat_condition:
                                                type: integer
            '401':
                description: Unauthorized
            '404':
                description: Room not found
            '500':
                description: Internal server error
    post:
        summary: Create Seats
        description: Add one or more seats to a room. The body is an array of seat objects.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: array
                        items:
                            type: object
                            required:
                                - rowIdentifier
                                - columnNumber
                                - seatCategory
                            properties:
                                rowIdentifier:
                                    type: string
                                    example: A
                                columnNumber:
                                    type: integer
                                    example: 1
                                seatCategory:
                                    type: integer
                                    example: 1
                                seatCondition:
                                    type: integer
                                    example: 1
        responses:
            '201':
                description: Seats created successfully
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Room not found
            '500':
                description: Internal server error
