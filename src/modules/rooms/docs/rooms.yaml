/rooms:
    get:
        summary: Obtener lista de todas las salas
        description: Retorna todas las salas activas (sin filtrar por sucursal). Requiere autenticación.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
                  default: 1
            - name: limit
              in: query
              schema:
                  type: integer
                  default: 10
        responses:
            '200':
                description: Lista de salas
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/Room'
                                metadata:
                                    type: object
            '401':
                description: No autorizado
            '500':
                description: Error interno

/rooms/{id}:
    get:
        summary: Obtener una sala por ID
        description: Retorna los detalles completos de una sala específica. Requiere autenticación.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la sala
        responses:
            '200':
                description: Sala encontrada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    $ref: '#/components/schemas/Room'
            '401':
                description: No autorizado
            '404':
                description: Sala no encontrada
            '500':
                description: Error interno

    put:
        summary: Actualizar datos técnicos de una sala
        description: Permite modificar nombre, capacidad total y/o tipos de proyección. Requiere rol de administrador (SUPER_ADMIN o CINEMA_MANAGER).
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                                description: Nuevo nombre de la sala (opcional)
                            totalCapacity:
                                type: integer
                                minimum: 0
                                description: Nueva capacidad total (opcional)
                            projectionTypes:
                                type: array
                                items:
                                    type: integer
                                description: Lista de IDs de tipos de proyección (reemplaza los existentes)
        responses:
            '200':
                description: Sala actualizada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: Error de validación
            '401':
                description: No autorizado
            '403':
                description: No tiene permisos
            '404':
                description: Sala no encontrada
            '500':
                description: Error interno

    delete:
        summary: Eliminar (clausurar) una sala (soft delete)
        description: Marca la sala como eliminada (status=4). No se permite si tiene funciones futuras activas. Requiere rol SUPER_ADMIN.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Sala clausurada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Sala no encontrada
            '409':
                description: Conflicto - la sala tiene funciones futuras activas
            '500':
                description: Error interno

/rooms/{id}/projection-types:
    get:
        summary: Obtener los tipos de proyección asociados a una sala
        description: Retorna la lista de tipos de proyección (2D, 3D, IMAX, etc.) que están disponibles en la sala.
        tags:
            - Rooms (projection types)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Lista de proyecciones
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            room:
                                                type: integer
                                            projection_type:
                                                type: integer
                                            status:
                                                type: integer
                                            _ProjectionType:
                                                type: object
                                                properties:
                                                    description:
                                                        type: string
            '401':
                description: No autorizado
            '404':
                description: Sala no encontrada
            '500':
                description: Error interno

    post:
        summary: Agregar un tipo de proyección a una sala
        description: Asocia un nuevo tipo de proyección (por ID) a la sala. Requiere rol de administrador.
        tags:
            - Rooms (projection types)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - projection_type
                        properties:
                            projection_type:
                                type: integer
                                description: ID del tipo de proyección (ej. 1=2D, 2=3D, 3=IMAX)
        responses:
            '201':
                description: Tipo de proyección agregado
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        room:
                                            type: integer
                                        projection_type:
                                            type: integer
                                        status:
                                            type: integer
            '400':
                description: Error de validación (campo faltante o inválido)
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Sala no encontrada
            '500':
                description: Error interno

/rooms/{id}/projection-types/{projectionTypeId}:
    delete:
        summary: Eliminar un tipo de proyección de una sala
        description: Desasocia un tipo de proyección de la sala (soft delete). Requiere rol de administrador.
        tags:
            - Rooms (projection types)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la sala
            - name: projectionTypeId
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la relación (room_projection_types)
        responses:
            '204':
                description: Eliminado exitosamente (sin contenido)
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Relación no encontrada
            '500':
                description: Error interno

/rooms/{id}/seats:
    get:
        summary: Obtener mapa de asientos de una sala
        description: Retorna todos los asientos de la sala (activos) con sus categorías y condiciones. Requiere autenticación.
        tags:
            - Rooms (seats)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
            - name: page
              in: query
              schema:
                  type: integer
            - name: limit
              in: query
              schema:
                  type: integer
        responses:
            '200':
                description: Lista de asientos
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/Seat'
                                metadata:
                                    type: object
            '401':
                description: No autorizado
            '404':
                description: Sala no encontrada
            '500':
                description: Error interno

    post:
        summary: Crear un asiento individual
        description: Agrega un asiento específico a la sala (útil para diseños irregulares). Requiere rol de administrador.
        tags:
            - Rooms (seats)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - row_identifier
                            - column_number
                            - seat_category
                            - seat_condition
                        properties:
                            row_identifier:
                                type: string
                                description: Identificador de fila (ej. "A", "Z", "AA")
                            column_number:
                                type: integer
                                minimum: 1
                            seat_category:
                                type: integer
                                description: ID de la categoría (1=General, 2=VIP, etc.)
                            seat_condition:
                                type: integer
                                description: ID de la condición (1=Operativo, 2=Dañado, 3=Mantenimiento)
        responses:
            '201':
                description: Asiento creado
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: Error de validación
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Sala no encontrada
            '409':
                description: Conflicto - ya existe un asiento en esa posición
            '500':
                description: Error interno

components:
    schemas:
        Room:
            type: object
            properties:
                id:
                    type: integer
                cinema:
                    type: integer
                name:
                    type: string
                grid_rows:
                    type: integer
                grid_columns:
                    type: integer
                total_capacity:
                    type: integer
                status:
                    type: integer
                _Cinema:
                    type: object
                    properties:
                        name:
                            type: string
                _Status:
                    type: object
                    properties:
                        description:
                            type: string
                _RoomProjectionTypes:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: integer
                            projection_type:
                                type: integer
                            _ProjectionType:
                                type: object
                                properties:
                                    description:
                                        type: string
        Seat:
            type: object
            properties:
                id:
                    type: integer
                room:
                    type: integer
                row_identifier:
                    type: string
                column_number:
                    type: integer
                seat_category:
                    type: integer
                seat_condition:
                    type: integer
                status:
                    type: integer
                _SeatCategory:
                    type: object
                    properties:
                        description:
                            type: string
                _SeatCondition:
                    type: object
                    properties:
                        description:
                            type: string
                _Status:
                    type: object
                    properties:
                        description:
                            type: string

    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
