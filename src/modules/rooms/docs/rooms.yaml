/cinemas/{cinemaId}/rooms:
    get:
        summary: List Rooms
        description: Retrieve all active rooms belonging to a cinema location.
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: A list of rooms
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            cinema:
                                                type: integer
                                            name:
                                                type: string
                                            grid_rows:
                                                type: integer
                                            grid_columns:
                                                type: integer
                                            total_capacity:
                                                type: integer
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
    post:
        summary: Create Room
        description: Register a new room in a cinema location. The total capacity is calculated from the seat grid (rows × columns).
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - projectionTypes
                            - gridRows
                            - gridColumns
                        properties:
                            name:
                                type: string
                                example: Sala 1
                            projectionTypes:
                                type: array
                                items:
                                    type: integer
                                example: [1, 2]
                            gridRows:
                                type: integer
                                example: 10
                            gridColumns:
                                type: integer
                                example: 15
        responses:
            '201':
                description: Room created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        room_id:
                                            type: integer
                                        name:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '409':
                description: Conflict — duplicate room name in cinema
            '500':
                description: Internal server error
