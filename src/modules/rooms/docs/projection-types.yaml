/rooms/{id}/projection-types:
    get:
        summary: Get Room Projection Types
        description: |
            Retrieve all projection types currently assigned to a room.
            Required permission: **CRUD:READ:ROOMS**
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: List of projection types for the room
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            room:
                                                type: integer
                                            projection_type:
                                                type: integer
            '401':
                description: Unauthorized
            '404':
                description: Room not found
            '500':
                description: Internal server error
    post:
        summary: Add Projection Type To Room
        description: |
            Assign an additional projection type to an existing room.
            Required permission: **CRUD:UPDATE:ROOMS**
        tags:
            - Rooms
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - projectionType
                        properties:
                            projectionType:
                                type: integer
                                example: 3
        responses:
            '201':
                description: Projection type added successfully
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Room not found
            '500':
                description: Internal server error
