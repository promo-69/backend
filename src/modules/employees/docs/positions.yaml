/employees/{id}/positions:
    put:
        summary: Change Employee Position
        description: Assign a new job position to an employee at a given cinema. The current active position is automatically closed before the new one is created.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - jobPosition
                            - cinema
                            - startDate
                        properties:
                            jobPosition:
                                type: integer
                                example: 2
                            cinema:
                                type: integer
                                example: 1
                            startDate:
                                type: string
                                format: date
                                example: '2026-03-01'
                            endDate:
                                type: string
                                format: date
                                nullable: true
                            salaryBase:
                                type: number
                                nullable: true
        responses:
            '201':
                description: Position changed successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        employee:
                                            type: integer
                                        job_position:
                                            type: integer
                                        cinema:
                                            type: integer
                                        start_date:
                                            type: string
                                            format: date
            '400':
                description: Bad request (validation errors or invalid references)
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
