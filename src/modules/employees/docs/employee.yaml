/employees/{id}:
    get:
        summary: Get Employee By ID
        description: Retrieve a single employee record by its ID.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        person:
                                            type: integer
                                        employee_code:
                                            type: string
                                        status:
                                            type: integer
                                        created_at:
                                            type: string
                                            format: date-time
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
    put:
        summary: Update Employee
        description: Update the employee code of an existing employee.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            employeeCode:
                                type: string
                                example: EMP-002
        responses:
            '200':
                description: Employee updated successfully
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Employee
        description: Soft-delete an employee record (status set to 4).
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee deleted successfully
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
