/employees/{id}:
    get:
        summary: Get Employee By ID
        description: |
            Retrieves a single employee's full record, including biographical
            data and position history. The employee must belong to the same
            cinema as the authenticated user.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        person:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                                document_number:
                                                    type: string
                                                first_name:
                                                    type: string
                                                last_name:
                                                    type: string
                                                gender:
                                                    type: integer
                                                    nullable: true
                                                phone_number:
                                                    type: string
                                                    nullable: true
                                                personal_email:
                                                    type: string
                                                    nullable: true
                                                birth_date:
                                                    type: string
                                                    format: date
                                                    nullable: true
                                        employee:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                                person:
                                                    type: integer
                                                employee_code:
                                                    type: string
                                                positions:
                                                    type: array
                                                    items:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            start_date:
                                                                type: string
                                                                format: date
                                                            end_date:
                                                                type: string
                                                                format: date
                                                                nullable: true
                                                            salary_base:
                                                                type: number
                                                                nullable: true
                                                            is_active:
                                                                type: boolean
                                                            job_position:
                                                                type: object
                                                                nullable: true
                                                            cinema:
                                                                type: object
                                                                nullable: true
                                        user:
                                            type: object
                                            nullable: true
                                            properties:
                                                id:
                                                    type: integer
                                                email:
                                                    type: string
                                                    format: email
                                                user_type:
                                                    type: integer
                                                signup_verified_at:
                                                    type: string
                                                    format: date-time
                                                    nullable: true
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
    patch:
        summary: Update Employee
        description: |
            Updates the employee's biographical data (in the people table)
            and/or the employee code. At least one field must be provided.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            employeeCode:
                                type: string
                                example: EMP-002
                            firstName:
                                type: string
                            lastName:
                                type: string
                            phoneNumber:
                                type: string
                            email:
                                type: string
                                format: email
                            birthDate:
                                type: string
                                format: date
                            gender:
                                type: integer
        responses:
            '200':
                description: Employee updated successfully
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
    delete:
        summary: Deactivate Employee
        description: |
            Performs a soft-delete on the employee, closes any active position
            (stamping the current date), and deactivates the associated user
            account.
        tags:
            - Employees
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee deactivated successfully
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
