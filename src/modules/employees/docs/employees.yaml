/employees:
    get:
        summary: List Employees
        description: Retrieve all employees registered in the system.
        tags:
            - Employees
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of employees
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            person:
                                                type: integer
                                            employee_code:
                                                type: string
                                            status:
                                                type: integer
                                            created_at:
                                                type: string
                                                format: date-time
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Employee
        description: Register a new employee. If the person does not exist by document number, they are created automatically.
        tags:
            - Employees
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - documentNumber
                            - firstName
                            - lastName
                            - employeeCode
                            - jobPosition
                            - cinema
                            - startDate
                        properties:
                            documentNumber:
                                type: string
                                example: V-98765432
                            firstName:
                                type: string
                                example: Carlos
                            lastName:
                                type: string
                                example: Pérez
                            employeeCode:
                                type: string
                                example: EMP-001
                            jobPosition:
                                type: integer
                                example: 1
                            cinema:
                                type: integer
                                example: 1
                            startDate:
                                type: string
                                format: date
                                example: '2026-01-15'
                            gender:
                                type: integer
                                nullable: true
                            phoneNumber:
                                type: string
                                nullable: true
                            email:
                                type: string
                                format: email
                                nullable: true
                            birthDate:
                                type: string
                                format: date
                                nullable: true
                            endDate:
                                type: string
                                format: date
                                nullable: true
                            salaryBase:
                                type: number
                                nullable: true
        responses:
            '201':
                description: Employee created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        employee_code:
                                            type: string
            '400':
                description: Bad request (validation errors or invalid references)
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
