/employees:
    get:
        summary: List Employees (by current user's cinema)
        description: |
            Retrieves all employees who have an active position in the cinema
            extracted from the authenticated user's JWT.
        tags:
            - Employees
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of employees
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            person:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    document_number:
                                                        type: string
                                                    first_name:
                                                        type: string
                                                    last_name:
                                                        type: string
                                                    gender:
                                                        type: integer
                                                        nullable: true
                                                    phone_number:
                                                        type: string
                                                        nullable: true
                                                    personal_email:
                                                        type: string
                                                        nullable: true
                                                    birth_date:
                                                        type: string
                                                        format: date
                                                        nullable: true
                                            employee:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    person:
                                                        type: integer
                                                    employee_code:
                                                        type: string
                                                    positions:
                                                        type: array
                                                        items:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                start_date:
                                                                    type: string
                                                                    format: date
                                                                end_date:
                                                                    type: string
                                                                    format: date
                                                                    nullable: true
                                                                salary_base:
                                                                    type: number
                                                                    nullable: true
                                                                is_active:
                                                                    type: boolean
                                                                job_position:
                                                                    type: object
                                                                    nullable: true
                                                                cinema:
                                                                    type: object
                                                                    nullable: true
                                            user:
                                                type: object
                                                nullable: true
                                                properties:
                                                    id:
                                                        type: integer
                                                    email:
                                                        type: string
                                                        format: email
                                                    user_type:
                                                        type: integer
                                                    signup_verified_at:
                                                        type: string
                                                        format: date-time
                                                        nullable: true
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Employee
        description: |
            Registers a new employee. If the person already exists by document
            number, the existing record is reused; otherwise a new person is
            created. The cinema is taken from the authenticated user's JWT,
            or from the request body when the session does not include a
            cinema context. Optionally, if email and password are provided,
            a user account is created for the employee.
        tags:
            - Employees
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - documentNumber
                            - firstName
                            - lastName
                            - employeeCode
                            - jobPosition
                            - startDate
                        properties:
                            documentNumber:
                                type: string
                                example: V-98765432
                            firstName:
                                type: string
                                example: Carlos
                            lastName:
                                type: string
                                example: Pérez
                            employeeCode:
                                type: string
                                example: EMP-001
                            jobPosition:
                                type: integer
                                description: Job position ID
                                example: 1
                            startDate:
                                type: string
                                format: date
                                example: '2026-01-15'
                            gender:
                                type: integer
                                nullable: true
                            phoneNumber:
                                type: string
                                nullable: true
                            email:
                                type: string
                                format: email
                                nullable: true
                                description: Required only if a user account should be created
                            password:
                                type: string
                                nullable: true
                                description: Required only if a user account should be created
                            birthDate:
                                type: string
                                format: date
                                nullable: true
                            endDate:
                                type: string
                                format: date
                                nullable: true
                            salaryBase:
                                type: number
                                nullable: true
        responses:
            '201':
                description: Employee created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        person:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                                document_number:
                                                    type: string
                                                first_name:
                                                    type: string
                                                last_name:
                                                    type: string
                                                gender:
                                                    type: integer
                                                    nullable: true
                                                phone_number:
                                                    type: string
                                                    nullable: true
                                                personal_email:
                                                    type: string
                                                    nullable: true
                                                birth_date:
                                                    type: string
                                                    format: date
                                                    nullable: true
                                        employee:
                                            type: object
                                            properties:
                                                id:
                                                    type: integer
                                                person:
                                                    type: integer
                                                employee_code:
                                                    type: string
                                                positions:
                                                    type: array
                                                    items:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            start_date:
                                                                type: string
                                                                format: date
                                                            end_date:
                                                                type: string
                                                                format: date
                                                                nullable: true
                                                            salary_base:
                                                                type: number
                                                                nullable: true
                                                            is_active:
                                                                type: boolean
                                                            job_position:
                                                                type: object
                                                                nullable: true
                                                            cinema:
                                                                type: object
                                                                nullable: true
                                        user:
                                            type: object
                                            nullable: true
                                            properties:
                                                id:
                                                    type: integer
                                                email:
                                                    type: string
                                                    format: email
                                                user_type:
                                                    type: integer
                                                signup_verified_at:
                                                    type: string
                                                    format: date-time
                                                    nullable: true
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
