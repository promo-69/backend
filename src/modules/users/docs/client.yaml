/users/client:
    post:
        summary: Create Client User
        description: Register a new client user with associated person details.
        tags:
            - Users
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                            password:
                                type: string
                                format: password
                            personData:
                                type: object
                                properties:
                                    documentNumber:
                                        type: string
                                    firstName:
                                        type: string
                                    lastName:
                                        type: string
                                    gender:
                                        type: integer
                                    phoneNumber:
                                        type: string
                                    email:
                                        type: string
                                        format: email
                                    birthDate:
                                        type: string
                                        format: date
                                required:
                                    - documentNumber
                                    - firstName
                                    - lastName
                        required:
                            - email
                            - password
                            - personData
        responses:
            '200':
                description: Client account created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Cuenta de cliente generada exitosamente.
            '400':
                description: Bad request
            '401':
                description: Unauthorized
            '500':
                description: Internal server error