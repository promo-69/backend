/users/admin:
    post:
        summary: Create Administrative User
        description: Create a new administrative user account with employee and role assignment.
        tags:
            - Users
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            employeeId:
                                type: integer
                            roleId:
                                type: integer
                            email:
                                type: string
                                format: email
                            password:
                                type: string
                                format: password
                        required:
                            - employeeId
                            - roleId
                            - email
                            - password
        responses:
            '200':
                description: Administrative account created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Cuenta administrativa generada exitosamente.
            '400':
                description: Bad request
            '401':
                description: Unauthorized
            '500':
                description: Internal server error