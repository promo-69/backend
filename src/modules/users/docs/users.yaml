/users/permissions/{id}:
    get:
        summary: Obtener un permiso por ID
        description: Retorna los detalles de un permiso específico. Requiere rol `ADMINISTRATOR`.
        tags:
            - Users (Roles & Permissions)
        security:
            - bearerAuth: []
