/users:
    get:
        summary: List Users
        description: Retrieve all users in the system.
        tags:
            - Users
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of users
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
            '401':
                description: Unauthorized
            '500':
                description: Internal server error