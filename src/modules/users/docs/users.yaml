/users:
    get:
        summary: List Users
        description: Retrieve all users in the system.
        tags:
            - Users
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of users
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            person:
                                                type: integer
                                            user_type:
                                                type: integer
                                            role:
                                                type: integer
                                                nullable: true
                                            email:
                                                type: string
                                                format: email
                                            signup_verified_at:
                                                type: string
                                                format: date-time
                                                nullable: true
                                            created_at:
                                                type: string
                                                format: date-time
                                            updated_at:
                                                type: string
                                                format: date-time
                                                nullable: true
                                            status:
                                                type: integer
                                            _People:
                                                type: object
                                                properties:
                                                    first_name:
                                                        type: string
                                                    last_name:
                                                        type: string
                                                    personal_email:
                                                        type: string
                                                        format: email
                                                    phone_number:
                                                        type: string
                                            _UserType:
                                                type: object
                                                properties:
                                                    description:
                                                        type: string
                                            _Roles:
                                                type: object
                                                properties:
                                                    code:
                                                        type: string
                                            _UserPermissions:
                                                type: array
                                                items:
                                                    type: object
                                                    properties:
                                                        permission:
                                                            type: string
                                                        is_granted:
                                                            type: integer
            '401':
                description: Unauthorized
            '500':
                description: Internal server error