/users/users:
    get:
        summary: Listar usuarios (sin restricción de rol)
        description: |
            Retorna todos los usuarios del sistema (con filtros). Solo requiere autenticación básica.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
            - name: limit
              in: query
              schema:
                  type: integer
        responses:
            '200':
                description: Lista de usuarios
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                rows:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/User'
                                count:
                                    type: integer
            '401':
                description: No autorizado
            '500':
                description: Error interno

/users/users/{id}:
    get:
        summary: Obtener un usuario por ID
        description: Retorna los detalles completos de un usuario específico. Requiere autenticación.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Usuario encontrado
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/User'
            '401':
                description: No autorizado
            '404':
                description: Usuario no encontrado
            '500':
                description: Error interno

    post:
        summary: Crear usuario genérico
        description: Endpoint de creación directa de usuario (sin lógica administrativa compleja). Solo requiere autenticación.
        tags:
            - Users
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                            password:
                                type: string
                            user_type:
                                type: integer
                            person:
                                type: integer
                            role:
                                type: integer
        responses:
            '201':
                description: Usuario creado
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/User'
            '400':
                description: Error de validación
            '401':
                description: No autorizado
            '500':
                description: Error interno

/users/profile:
    patch:
        summary: Actualizar perfil del usuario autenticado
        description: |
            Permite modificar datos personales del usuario logueado (teléfono, fecha de nacimiento, nombres, email personal).
            **No permite** cambiar email principal ni contraseña.
        tags:
            - Users (Profile)
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            phone_number:
                                type: string
                            birth_date:
                                type: string
                                format: date
                            first_name:
                                type: string
                            last_name:
                                type: string
                            personal_email:
                                type: string
        responses:
            '200':
                description: Perfil actualizado
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: Error de validación (formato inválido, intento de cambiar email principal)
            '401':
                description: No autorizado
            '500':
                description: Error interno

components:
    schemas:
        User:
            type: object
            properties:
                id:
                    type: integer
                email:
                    type: string
                user_type:
                    type: integer
                    description: 1 = empleado, 2 = cliente
                person:
                    type: integer
                role:
                    type: integer
                    nullable: true
                status:
                    type: integer
                signup_verified_at:
                    type: string
                    format: date-time
                created_at:
                    type: string
                    format: date-time
                updated_at:
                    type: string
                    format: date-time
                _People:
                    type: object
                    properties:
                        first_name:
                            type: string
                        last_name:
                            type: string
                        document_number:
                            type: string
                        phone_number:
                            type: string
                        personal_email:
                            type: string
                        birth_date:
                            type: string
                            format: date
        Role:
            type: object
            properties:
                id:
                    type: integer
                name:
                    type: string
                code:
                    type: string
                description:
                    type: string
                status:
                    type: integer
                created_at:
                    type: string
                    format: date-time
                updated_at:
                    type: string
                    format: date-time
        Permission:
            type: object
            properties:
                id:
                    type: integer
                name:
                    type: string
                code:
                    type: string
                description:
                    type: string
                resource:
                    type: string
                action:
                    type: string
                type:
                    type: string
                status:
                    type: integer
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
