/users:
    post:
        summary: Crear cuenta administrativa (empleado o cliente)
        description: |
            Crea una cuenta de usuario (tipo empleado o cliente) con rol y datos asociados.
            Requiere rol `ADMINISTRATOR`.
        tags:
            - Users
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - user_type
                            - email
                            - password
                        properties:
                            user_type:
                                type: integer
                                description: 1 = empleado, 2 = cliente
                            employee_id:
                                type: integer
                                description: ID del empleado (obligatorio si user_type=1)
                            role_id:
                                type: integer
                                description: ID del rol (obligatorio si user_type=1)
                            personData:
                                type: object
                                description: Datos de la persona (obligatorio si user_type=2)
                                properties:
                                    document_number:
                                        type: string
                                    first_name:
                                        type: string
                                    last_name:
                                        type: string
                                    gender:
                                        type: integer
                                    phone_number:
                                        type: string
                                    email:
                                        type: string
                                    birth_date:
                                        type: string
                                        format: date
                            email:
                                type: string
                            password:
                                type: string
        responses:
            '200':
                description: Cuenta creada exitosamente (retorna el usuario creado)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/User'
            '400':
                description: Error de validación (campos faltantes o inválidos)
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '500':
                description: Error interno

/users/{id}/status:
    patch:
        summary: Cambiar el estado de un usuario (activar/desactivar)
        description: |
            Permite activar (status=1) o desactivar (status=0) una cuenta de usuario.
            Al desactivar, se revocan todas las sesiones activas (token blacklist).
            Requiere rol `ADMINISTRATOR`.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - status
                        properties:
                            status:
                                type: integer
                                enum: [0, 1]
                                description: 0 = inactivo, 1 = activo
        responses:
            '200':
                description: Estado actualizado
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: Estado inválido
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Usuario no encontrado
            '500':
                description: Error interno

/users/roles:
    get:
        summary: Listar roles
        description: Retorna todos los roles del sistema. Requiere rol `ADMINISTRATOR`.
        tags:
            - Users (Roles & Permissions)
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
            - name: limit
              in: query
              schema:
                  type: integer
        responses:
            '200':
                description: Lista de roles
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                rows:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/Role'
                                count:
                                    type: integer
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '500':
                description: Error interno

/users/roles/{id}:
    get:
        summary: Obtener un rol por ID
        description: Retorna los detalles de un rol específico. Requiere rol `ADMINISTRATOR`.
        tags:
            - Users (Roles & Permissions)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Rol encontrado
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Role'
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Rol no encontrado
            '500':
                description: Error interno

/users/permissions:
