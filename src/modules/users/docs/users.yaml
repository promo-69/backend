            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Permiso encontrado
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Permission'
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
