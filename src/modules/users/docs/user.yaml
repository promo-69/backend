/users/{id}:
    get:
        summary: Get User By Id
        description: Retrieve a specific user by ID.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
        responses:
            '200':
                description: User retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error