/users/{id}:
    get:
        summary: Get User By Id
        description: Retrieve a specific user by ID.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
        responses:
            '200':
                description: User retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        person:
                                            type: integer
                                        user_type:
                                            type: integer
                                        role:
                                            type: integer
                                            nullable: true
                                        email:
                                            type: string
                                            format: email
                                        last_login:
                                            type: string
                                            format: date-time
                                            nullable: true
                                        signup_verified_at:
                                            type: string
                                            format: date-time
                                            nullable: true
                                        created_at:
                                            type: string
                                            format: date-time
                                        updated_at:
                                            type: string
                                            format: date-time
                                            nullable: true
                                        status:
                                            type: integer
                                        _People:
                                            type: object
                                            properties:
                                                first_name:
                                                    type: string
                                                last_name:
                                                    type: string
                                                personal_email:
                                                    type: string
                                                    format: email
                                                phone_number:
                                                    type: string
                                        _UserType:
                                            type: object
                                            properties:
                                                description:
                                                    type: string
                                        _Roles:
                                            type: object
                                            properties:
                                                code:
                                                    type: string
                                        _UserPermissions:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    permission:
                                                        type: string
                                                    is_granted:
                                                        type: integer
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error