/users/roles:
    get:
        summary: List Roles
        description: Retrieve all available roles in the system.
        tags:
            - Users
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of roles
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            code:
                                                type: string
                                            name:
                                                type: string
                                            description:
                                                type: string
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
