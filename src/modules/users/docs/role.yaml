/users/roles/{id}:
    get:
        summary: Get Role By Id
        description: Retrieve a specific role by its ID.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
        responses:
            '200':
                description: Role retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        code:
                                            type: string
                                        name:
                                            type: string
                                        description:
                                            type: string
                                        status:
                                            type: integer
            '401':
                description: Unauthorized
            '404':
                description: Role not found
            '500':
                description: Internal server error