/users/{id}/status:
    patch:
        summary: Change User Status
        description: Activate or deactivate a user account.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            status:
                                type: integer
                                enum: [0, 1]
                        required:
                            - status
        responses:
            '200':
                description: Status changed successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: El acceso de la cuenta ha sido suspendido.
            '400':
                description: Bad request
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error