/users/me:
    get:
        tags:
        - Users (Self-Service)
        summary: Get my profile
        description: Returns the profile information of the currently authenticated
            user.
        security:
        -   cookieAuth: []
        -   bearerAuth: []
        responses:
            '200':
                description: Profile retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Perfil recuperado exitosamente.
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                            example: 1
                                        person:
                                            type: integer
                                            example: 1
                                        user_type:
                                            type: integer
                                            example: 1
                                        role:
                                            type: integer
                                            example: 1
                                        email:
                                            type: string
                                            example: user@example.com
                                        signup_verified_at:
                                            type: string
                                            example: "2026-06-09T12:00:00Z"
                                        created_at:
                                            type: string
                                            example: "2026-06-09T12:00:00Z"
                                        updated_at:
                                            type: string
                                            example: "2026-06-09T12:00:00Z"
                                        _People:
                                            type: object
                                            properties:
                                                first_name:
                                                    type: string
                                                    example: "John"
                                                last_name:
                                                    type: string
                                                    example: "Doe"
                                                personal_email:
                                                    type: string
                                                    example: "john.doe@example.com"
                                                phone_number:
                                                    type: string
                                                    example: "+1234567890"
                                        _UserType:
                                            type: object
                                            properties:
                                                description:
                                                    type: string
                                                    example: "Empleado"
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
