/users/me:
    get:
        tags:
        - Users (Self-Service)
        summary: Get my profile
        description: Returns the profile information of the currently authenticated
            user.
        security:
        -   cookieAuth: []
        -   bearerAuth: []
        responses:
            '200':
                description: Profile retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Perfil recuperado exitosamente.
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                            example: 1
                                        email:
                                            type: string
                                            example: user@example.com
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
