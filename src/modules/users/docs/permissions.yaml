/users/permissions:
    get:
        summary: List Permissions
        description: Retrieve all available permissions in the system.
        tags:
            - Users
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of permissions
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            action:
                                                type: integer
                                            resource:
                                                type: integer
                                            permission_type:
                                                type: integer
                                            _Actions:
                                                type: object
                                                properties:
                                                    code:
                                                        type: string
                                                    description:
                                                        type: string
                                            _Resources:
                                                type: object
                                                properties:
                                                    code:
                                                        type: string
                                                    description:
                                                        type: string
                                            _PermissionTypes:
                                                type: object
                                                properties:
                                                    code:
                                                        type: string
                                                    description:
                                                        type: string
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
