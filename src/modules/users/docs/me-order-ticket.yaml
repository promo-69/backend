/users/me/orders/{orderId}/ticket:
    get:
        tags:
            - Users (Self-Service)
        summary: Get order tickets
        description: Retrieve tickets for a specific order belonging to the authenticated user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - in: path
              name: orderId
              required: true
              schema:
                  type: integer
              description: Order identifier
        responses:
            '200':
                description: Tickets retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Tickets de la orden recuperados correctamente.
                                data:
                                    type: array
                                    items:
                                        type: object
            '401':
                description: Unauthorized
            '403':
                description: Forbidden
            '404':
                description: Order not found or not owned by user
            '500':
                description: Internal server error
