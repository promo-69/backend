/users/me/loyalty/ledgers:
    get:
        tags:
        - Users (Self-Service)
        summary: Get my loyalty ledgers
        description: Paginated list of loyalty ledger entries for the authenticated user.
        security:
        -   cookieAuth: []
        -   bearerAuth: []
        parameters:
        -   in: query
            name: page
            schema:
                type: integer
        -   in: query
            name: limit
            schema:
                type: integer
        responses:
            '200':
                description: Loyalty ledgers retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Loyalty ledgers retrieved.
                                data:
                                    type: array
                                    items:
                                        type: object
                                metadata:
                                    type: object
                                    properties:
                                        offset:
                                            type: integer
                                        limit:
                                            type: integer
                                        total:
                                            type: integer
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
