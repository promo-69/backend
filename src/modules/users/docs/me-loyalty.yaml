/users/me/loyalty:
    get:
        tags:
            - Users (Self-Service)
        summary: Get my loyalty summary
        description: Returns the user's loyalty level, level progress points and current points balance.
        security:
            - cookieAuth: []
            - bearerAuth: []
        responses:
            '200':
                description: Loyalty info retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Loyalty info retrieved.
                                data:
                                    type: object
                                    properties:
                                        loyalty_level:
                                            type: integer
                                            nullable: true
                                        level_progress_points:
                                            type: integer
                                        points_balance:
                                            type: integer
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
