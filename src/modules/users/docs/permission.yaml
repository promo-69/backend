/users/permissions/{id}:
    get:
        summary: Get Permission By Id
        description: Retrieve a specific permission by its ID.
        tags:
            - Users
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
        responses:
            '200':
                description: Permission retrieved successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        action:
                                            type: integer
                                        resource:
                                            type: integer
                                        permission_type:
                                            type: integer
                                        status:
                                            type: integer
                                        _Actions:
                                            type: object
                                            properties:
                                                code:
                                                    type: string
                                                description:
                                                    type: string
                                        _Resources:
                                            type: object
                                            properties:
                                                code:
                                                    type: string
                                                description:
                                                    type: string
                                        _PermissionTypes:
                                            type: object
                                            properties:
                                                code:
                                                    type: string
                                                description:
                                                    type: string
            '401':
                description: Unauthorized
            '404':
                description: Permission not found
            '500':
                description: Internal server error