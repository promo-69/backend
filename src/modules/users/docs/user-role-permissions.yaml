/users/{id}/role:
    get:
        tags:
            - Users
        summary: Get user role
        description: Returns the role assigned to the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: User role retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Rol de usuario recuperado correctamente.
                                data:
                                    oneOf:
                                        - type: object
                                          properties:
                                              id:
                                                  type: integer
                                                  example: 2
                                              code:
                                                  type: string
                                                  example: ADMIN
                                              name:
                                                  type: string
                                                  example: Administrador
                                              description:
                                                  type: string
                                                  example: Rol con acceso completo.
                                        - type: 'null'
            '401':
                description: Unauthorized
            '404':
                description: User or role not found
            '500':
                description: Internal server error
    post:
        tags:
            - Users
        summary: Assign role to user
        description: Assigns a role to the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            roleId:
                                type: integer
                                example: 2
                        required:
                            - roleId
        responses:
            '200':
                description: Role assigned successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Rol asignado al usuario correctamente.
                                data:
                                    type: 'null'
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: User or role not found
            '500':
                description: Internal server error
    delete:
        tags:
            - Users
        summary: Remove user role
        description: Removes the role assignment from the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Role removed successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Rol removido del usuario correctamente.
                                data:
                                    type: 'null'
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error
/users/{id}/permissions:
    get:
        tags:
            - Users
        summary: Get user permissions
        description: Returns direct permissions assigned to the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: User permissions retrieved successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Permisos de usuario recuperados correctamente.
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                                example: 4
                                            user:
                                                type: integer
                                                example: 1
                                            permission:
                                                type: integer
                                                example: 5
                                            is_granted:
                                                type: boolean
                                                example: true
                                            _Permissions:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                        example: 5
                                                    action:
                                                        type: integer
                                                        example: 1
                                                    resource:
                                                        type: integer
                                                        example: 2
                                                    permission_type:
                                                        type: integer
                                                        example: 1
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error
    post:
        tags:
            - Users
        summary: Assign permissions to user
        description: Assigns direct permissions to the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            permissions:
                                type: array
                                items:
                                    type: integer
                                example: [1, 2]
                        required:
                            - permissions
        responses:
            '200':
                description: Permissions assigned successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Permisos asignados al usuario correctamente.
                                data:
                                    type: 'null'
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: User or permissions not found
            '500':
                description: Internal server error
    delete:
        tags:
            - Users
        summary: Remove permissions from user
        description: Logically removes direct permissions from the specified user.
        security:
            - cookieAuth: []
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            permissions:
                                type: array
                                items:
                                    type: integer
                                example: [1]
                        required:
                            - permissions
        responses:
            '200':
                description: Permissions removed successfully.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Permisos removidos del usuario correctamente.
                                data:
                                    type: 'null'
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: User not found
            '500':
                description: Internal server error
