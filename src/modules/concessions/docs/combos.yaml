/concessions/combos:
    get:
        summary: List Combos
        description: Retrieve all concession combos available in the system.
        tags:
            - Concessions
        responses:
            '200':
                description: A list of combos
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            sku:
                                                type: string
                                            description:
                                                type: string
                                            price:
                                                type: number
                                            earned_loyalty_points:
                                                type: integer
                                                nullable: true
                                            status:
                                                type: integer
            '500':
                description: Internal server error
    post:
        summary: Create Combo
        description: Register a new combo grouping multiple concession products under a single price.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - sku
                            - description
                            - currencyId
                            - price
                            - products
                        properties:
                            name:
                                type: string
                                example: Family Combo
                            sku:
                                type: string
                                example: CMB-FAM-001
                            description:
                                type: string
                                example: 2 medium popcorns + 2 drinks
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 10.00
                            earnedLoyaltyPoints:
                                type: integer
                                example: 25
                            products:
                                type: array
                                items:
                                    type: object
                                    required:
                                        - productId
                                        - quantity
                                    properties:
                                        productId:
                                            type: integer
                                            example: 1
                                        quantity:
                                            type: integer
                                            example: 2
        responses:
            '201':
                description: Combo created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Combo registrado exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        sku:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate SKU
            '500':
                description: Internal server error
