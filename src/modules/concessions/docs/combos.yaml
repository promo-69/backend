/concessions/combos:
    get:
        summary: List Combos
        description: Retrieve all concession combos with their image URL.
        tags:
            - Concessions
        security:
            - bearerAuth: []
            - {}
        responses:
            '200':
                description: A list of combos
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            sku:
                                                type: string
                                            description:
                                                type: string
                                            price:
                                                type: number
                                            earned_loyalty_points:
                                                type: integer
                                                nullable: true
                                            image_url:
                                                type: string
                                                nullable: true
                                            pricing:
                                                type: object
                                                properties:
                                                    base_price:
                                                        type: number
                                                    final_price:
                                                        type: number
                                                    applied_modifiers:
                                                        type: array
                                                        items:
                                                            type: object
            '500':
                description: Internal server error
    post:
        summary: Create Combo
        description: Register a new combo with optional image.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        required:
                            - name
                            - sku
                            - description
                            - currencyId
                            - price
                            - products
                        properties:
                            name:
                                type: string
                                example: Family Combo
                            sku:
                                type: string
                                example: CMB-FAM-001
                            description:
                                type: string
                                example: 2 medium popcorns + 2 drinks
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 10.00
                            earnedLoyaltyPoints:
                                type: integer
                                example: 25
                            products:
                                type: string
                                description: JSON string of array [{ productId, quantity }]
                                example: '[{"productId":1,"quantity":2}]'
                            image:
                                type: string
                                format: binary
                                description: Combo image (optional)
        responses:
            '201':
                description: Combo created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Combo registrado exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        sku:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate SKU
            '500':
                description: Internal server error

    /{id}:
        get:
            summary: Get Combo by ID
            description: Retrieve a single combo by its ID.
            tags:
                - Concessions
            security:
                - bearerAuth: []
                - {}
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: Combo details
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            sku:
                                                type: string
                                            pricing:
                                                type: object
                                                properties:
                                                    base_price:
                                                        type: number
                                                    final_price:
                                                        type: number
                                                    applied_modifiers:
                                                        type: array
                                                        items:
                                                            type: object
                '404':
                    description: Combo not found
                '500':
                    description: Internal server error
