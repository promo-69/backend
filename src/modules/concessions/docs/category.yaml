/concessions/categories/{id}:
    get:
        summary: Get Category By ID
        description: Retrieve a single product category.
        tags:
            - Concessions
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Category ID
        responses:
            '200':
                description: Category found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        description:
                                            type: string
                                            nullable: true
            '404':
                description: Category not found
            '500':
                description: Internal server error
    put:
        summary: Update Category
        description: Update the name or description of a product category. Requires admin role.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Category ID
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                                example: Bebidas sin alcohol
                            description:
                                type: string
                                example: Refrescos, aguas y zumos
        responses:
            '200':
                description: Category updated successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Categoría actualizada exitosamente
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Category not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Category
        description: Delete a product category (only if no products are assigned to it). Requires admin role.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Category ID
        responses:
            '200':
                description: Category deleted successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Categoría eliminada exitosamente
            '400':
                description: Bad request
            '401':
                description: Unauthorized
            '404':
                description: Category not found
            '409':
                description: Conflict — category has associated products
            '500':
                description: Internal server error
