/concessions/products/available:
    get:
        summary: List Available Products
        description: Retrieve all concession products that are active and available for sale.
        tags:
            - Concessions
        parameters:
            - in: query
              name: cinemaId
              required: true
              schema:
                  type: integer
              description: ID of the cinema to check availability for
        responses:
            '200':
                description: A list of available concession products
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            sku:
                                                type: string
                                            price:
                                                type: number
                                            earned_loyalty_points:
                                                type: integer
                                                nullable: true
                                            image_url:
                                                type: string
                                                nullable: true
                                            _ProductCategory:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    name:
                                                        type: string
                                            pricing:
                                                type: object
                                                properties:
                                                    base_price:
                                                        type: number
                                                    final_price:
                                                        type: number
                                                    applied_modifiers:
                                                        type: array
                                                        items:
                                                            type: object
            '500':
                description: Internal server error
