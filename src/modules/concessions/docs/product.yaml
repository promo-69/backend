/concessions/products/{id}:
    get:
        summary: Get Product By ID
        description: Retrieve a single concession product by its ID, including category and image.
        tags:
            - Concessions
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Product ID
        responses:
            '200':
                description: Product found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        sku:
                                            type: string
                                        price:
                                            type: number
                                        earned_loyalty_points:
                                            type: integer
                                            nullable: true
                                        image_url:
                                            type: string
                                            nullable: true
                                        _ProductCategory:
                                            type: object
                                            properties:
                                                description:
                                                    type: string
            '404':
                description: Product not found
            '500':
                description: Internal server error
    patch:
        summary: Update Product
        description: Update the details of an existing product. Optionally replace the image.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Product ID
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                                example: Pepsi 500ml (Summer Edition)
                            price:
                                type: number
                                example: 2.75
                            currencyId:
                                type: integer
                                example: 1
                            earnedLoyaltyPoints:
                                type: integer
                                example: 7
                            image:
                                type: string
                                format: binary
                                description: New product image (optional)
        responses:
            '200':
                description: Product updated successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Producto actualizado exitosamente
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Product not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Product
        description: Soft‑delete a product. Fails if the product belongs to active combos.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Product ID
        responses:
            '200':
                description: Product deleted successfully
            '400':
                description: Bad request
            '401':
                description: Unauthorized
            '404':
                description: Product not found
            '409':
                description: Conflict — product belongs to active combos
            '500':
                description: Internal server error
