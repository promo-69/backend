/concessions/categories:
    get:
        summary: List Product Categories
        description: Retrieve all product categories.
        tags:
            - Concessions
        responses:
            '200':
                description: A list of product categories
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            description:
                                                type: string
                                                nullable: true
            '500':
                description: Internal server error
    post:
        summary: Create Category
        description: Create a new product category. Requires admin role.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                        properties:
                            name:
                                type: string
                                example: Bebidas
                            description:
                                type: string
                                example: Refrescos y aguas
        responses:
            '201':
                description: Category created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Categoría registrada exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate name
            '500':
                description: Internal server error
