/concessions/inventory/{cinemaId}/products/{productId}/replenish:
    post:
        summary: Replenish Inventory
        description: Register a stock replenishment for a specific product at a cinema location.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
              description: Cinema (branch) ID
            - in: path
              name: productId
              required: true
              schema:
                  type: integer
              description: Product ID
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - quantity
                        properties:
                            quantity:
                                type: integer
                                example: 100
                            remarks:
                                type: string
                                example: Weekly replenishment from supplier
        responses:
            '201':
                description: Replenishment registered successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Reposición de inventario registrada exitosamente
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Cinema or product not found
            '500':
                description: Internal server error
