/concessions/products:
    get:
        summary: List Products
        description: Retrieve all concession products, each with its category and image URL.
        tags:
            - Concessions
        responses:
            '200':
                description: A list of concession products
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            sku:
                                                type: string
                                            price:
                                                type: number
                                            earned_loyalty_points:
                                                type: integer
                                                nullable: true
                                            image_url:
                                                type: string
                                                nullable: true
                                            created_at:
                                                type: string
                                                format: date-time
                                            _ProductCategory:
                                                type: object
                                                properties:
                                                    description:
                                                        type: string
            '500':
                description: Internal server error
    post:
        summary: Create Product
        description: Register a new concession product. Supports optional image upload.
        tags:
            - Concessions
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        required:
                            - name
                            - sku
                            - productCategory
                            - currencyId
                            - price
                        properties:
                            name:
                                type: string
                                example: Pepsi 500ml
                            sku:
                                type: string
                                example: BEB-PEPSI-500
                            productCategory:
                                type: integer
                                example: 1
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 2.50
                            earnedLoyaltyPoints:
                                type: integer
                                example: 5
                            image:
                                type: string
                                format: binary
                                description: Product image (JPEG, PNG, WebP)
        responses:
            '201':
                description: Product created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Producto registrado exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        sku:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate SKU
            '500':
                description: Internal server error
