/reports/cashier:
    get:
        summary: Get cashier report (employee)
        description: |
            Retrieve shift report for the authenticated employee.
            Required permission: **CRUD:READ:REPORTS-CASHIER**
        tags:
            - Reports
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: from
              schema:
                  type: string
                  format: date
              description: Start date (YYYY-MM-DD)
            - in: query
              name: to
              schema:
                  type: string
                  format: date
              description: End date (YYYY-MM-DD)
        responses:
            '200':
                description: Cashier report
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        period:
                                            type: object
                                            properties:
                                                from:
                                                    type: string
                                                    format: date
                                                to:
                                                    type: string
                                                    format: date
                                        employee_id:
                                            type: integer
                                        summary:
                                            type: object
                                            properties:
                                                total_orders:
                                                    type: integer
                                                total_revenue:
                                                    type: number
                                                total_tax:
                                                    type: number
                                                cancelled_orders:
                                                    type: integer
                                        breakdown_by_payment_method:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    payment_method:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    total_amount:
                                                        type: number
                                                    transaction_count:
                                                        type: integer
                                        transactions:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    order_id:
                                                        type: integer
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                    status:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    total:
                                                        type: number
                                                    payments:
                                                        type: array
                                                        items:
                                                            type: object
                                                            properties:
                                                                method:
                                                                    type: object
                                                                    properties:
                                                                        id:
                                                                            type: integer
                                                                        description:
                                                                            type: string
                                                                amount:
                                                                    type: number
                                                                reference:
                                                                    type: string
                                                                    nullable: true
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions

/reports/cinemas/{cinemaId}/cashier/{employeeId}:
    get:
        summary: Get cashier report for a specific employee (superadmin)
        tags:
            - Reports Admin
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: path
              name: employeeId
              required: true
              schema:
                  type: integer
            - in: query
              name: from
              schema:
                  type: string
                  format: date
            - in: query
              name: to
              schema:
                  type: string
                  format: date
        responses:
            '200':
                description: Cashier report for the specified employee
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions
