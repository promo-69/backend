/reports/inventory:
    get:
        summary: Get inventory report (employee)
        description: |
            Retrieve current stock, sold units, received units, and stock value for the employee's cinema.
            Required permission: **CRUD:READ:REPORTS-INVENTORY**
        tags:
            - Reports
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: from
              schema:
                  type: string
                  format: date
              description: Start date (YYYY-MM-DD)
            - in: query
              name: to
              schema:
                  type: string
                  format: date
              description: End date (YYYY-MM-DD)
        responses:
            '200':
                description: Inventory report
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        period:
                                            type: object
                                            properties:
                                                from:
                                                    type: string
                                                    format: date
                                                to:
                                                    type: string
                                                    format: date
                                        products:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    inventory_id:
                                                        type: integer
                                                    product:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            name:
                                                                type: string
                                                            sku:
                                                                type: string
                                                            category:
                                                                type: object
                                                            selling_price:
                                                                type: number
                                                            currency_id:
                                                                type: integer
                                                    current_stock:
                                                        type: integer
                                                    minimum_stock:
                                                        type: integer
                                                    units_sold:
                                                        type: integer
                                                    units_received:
                                                        type: integer
                                                    stock_value:
                                                        type: number
                                                    below_minimum:
                                                        type: boolean
                                        alerts:
                                            type: array
                                            items:
                                                type: object
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions

/reports/cinemas/{cinemaId}/inventory:
    get:
        summary: Get inventory report for a specific cinema (superadmin)
        tags:
            - Reports Admin
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: query
              name: from
              schema:
                  type: string
                  format: date
            - in: query
              name: to
              schema:
                  type: string
                  format: date
        responses:
            '200':
                description: Inventory report for the specified cinema
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions
