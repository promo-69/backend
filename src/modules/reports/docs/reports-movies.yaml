/reports/movies:
    get:
        summary: Get movies report (employee)
        description: |
            Retrieve statistics for movies screened in the employee's cinema.
            Required permission: **CRUD:READ:REPORTS-MOVIES**
        tags:
            - Reports
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: from
              schema:
                  type: string
                  format: date
              description: Start date (YYYY-MM-DD)
            - in: query
              name: to
              schema:
                  type: string
                  format: date
              description: End date (YYYY-MM-DD)
        responses:
            '200':
                description: Movies report
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Reporte de películas generado exitosamente
                                data:
                                    type: object
                                    properties:
                                        period:
                                            type: object
                                            properties:
                                                from:
                                                    type: string
                                                    format: date
                                                to:
                                                    type: string
                                                    format: date
                                        movies:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    movie:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            title:
                                                                type: string
                                                            poster_url:
                                                                type: string
                                                                nullable: true
                                                    total_showtimes:
                                                        type: integer
                                                    total_tickets_sold:
                                                        type: integer
                                                    total_revenue:
                                                        type: number
                                                    avg_occupancy_pct:
                                                        type: number
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions

/reports/cinemas/{cinemaId}/movies:
    get:
        summary: Get movies report for a specific cinema (superadmin)
        tags:
            - Reports Admin
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: query
              name: from
              schema:
                  type: string
                  format: date
            - in: query
              name: to
              schema:
                  type: string
                  format: date
        responses:
            '200':
                description: Movies report for the specified cinema
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions
