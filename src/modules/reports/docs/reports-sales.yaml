/reports/sales:
    get:
        summary: Get sales report (employee)
        description: |
            Retrieve consolidated sales report for the authenticated employee's cinema.
            Required permission: **CRUD:READ:REPORTS-SALES**
        tags:
            - Reports
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: from
              schema:
                  type: string
                  format: date
              description: Start date (YYYY-MM-DD)
            - in: query
              name: to
              schema:
                  type: string
                  format: date
              description: End date (YYYY-MM-DD)
            - in: query
              name: channel
              schema:
                  type: string
                  enum: [all, taquilla, web, app]
              description: Sales channel filter
        responses:
            '200':
                description: Sales report
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Reporte de ventas generado exitosamente
                                data:
                                    type: object
                                    properties:
                                        period:
                                            type: object
                                            properties:
                                                from:
                                                    type: string
                                                    format: date
                                                    example: '2026-06-01'
                                                to:
                                                    type: string
                                                    format: date
                                                    example: '2026-06-08'
                                        channel:
                                            type: string
                                            example: all
                                        summary:
                                            type: object
                                            properties:
                                                total_orders:
                                                    type: integer
                                                total_tickets:
                                                    type: integer
                                                total_revenue:
                                                    type: number
                                                total_tax:
                                                    type: number
                                                total_concessions_revenue:
                                                    type: number
                                                total_loyalty_points_generated:
                                                    type: integer
                                                net_revenue:
                                                    type: number
                                        breakdown_by_payment_method:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    payment_method:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    total_amount:
                                                        type: number
                                                    transaction_count:
                                                        type: integer
                                        daily_series:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    date:
                                                        type: string
                                                        format: date
                                                    orders:
                                                        type: integer
                                                    tickets:
                                                        type: integer
                                                    revenue:
                                                        type: number
                                                    loyalty_points:
                                                        type: integer
                                        product_breakdown:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    product_id:
                                                        type: integer
                                                    product_name:
                                                        type: string
                                                    type:
                                                        type: string
                                                        enum: [product, combo]
                                                    quantity_sold:
                                                        type: integer
                                                    total_revenue:
                                                        type: number
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions

/reports/cinemas/{cinemaId}/sales:
    get:
        summary: Get sales report for a specific cinema (superadmin)
        description: |
            Retrieve consolidated sales report for any cinema.
            Required permission: **CRUD:READ:REPORTS-ALL**
        tags:
            - Reports Admin
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: query
              name: from
              schema:
                  type: string
                  format: date
            - in: query
              name: to
              schema:
                  type: string
                  format: date
            - in: query
              name: channel
              schema:
                  type: string
                  enum: [all, taquilla, web, app]
        responses:
            '200':
                description: Sales report for the specified cinema
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions
