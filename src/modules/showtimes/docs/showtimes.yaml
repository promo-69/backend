/showtimes:
    get:
        summary: List Showtimes
        description: Retrieve all scheduled showtimes in the system.
        tags:
            - Showtimes
        responses:
            '200':
                description: A list of showtimes
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            movie_id:
                                                type: integer
                                            room_id:
                                                type: integer
                                            projection_type_id:
                                                type: integer
                                            start_time:
                                                type: string
                                                format: date-time
                                            end_time:
                                                type: string
                                                format: date-time
                                            price:
                                                type: number
                                            earned_loyalty_points:
                                                type: integer
                                                nullable: true
                                            status:
                                                type: integer
            '500':
                description: Internal server error
    post:
        summary: Create Showtime
        description: |
            Schedule a new showtime for a movie in a room.
            If the movie was in "Coming Soon" state, it automatically transitions
            to "Now Showing" state.
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - movieId
                            - roomId
                            - projectionTypeId
                            - startTime
                            - currencyId
                            - price
                        properties:
                            movieId:
                                type: integer
                                example: 1
                            roomId:
                                type: integer
                                example: 2
                            projectionTypeId:
                                type: integer
                                example: 1
                            startTime:
                                type: string
                                format: date-time
                                example: '2026-06-01T18:00:00Z'
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 12.50
                            earnedLoyaltyPoints:
                                type: integer
                                example: 10
        responses:
            '201':
                description: Showtime scheduled successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Función programada exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        start_time:
                                            type: string
                                            format: date-time
                                        end_time:
                                            type: string
                                            format: date-time
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — room schedule overlap or incompatible projection type
            '500':
                description: Internal server error
