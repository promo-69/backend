        tags:
            - Showtimes por sucursal
        security: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: query
              name: date
              schema:
                  type: string
                  format: date
              description: Fecha exacta (YYYY-MM-DD). No usar junto con startDate/endDate.
            - in: query
