                            - currency
                            - price
                        properties:
                            room:
                                type: integer
                            movie:
                                type: integer
                            projection_type:
                                type: integer
                            language:
                                type: integer
                            start_time:
                                type: string
                                format: date-time
                            end_time:
                                type: string
                                format: date-time
                            currency:
                                type: integer
                            price:
                                type: number
                            earned_loyalty_points:
                                type: integer
                                nullable: true
        responses:
