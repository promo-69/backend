/showtimes/{id}/seat-map:
    get:
        summary: 'PÚBLICO — Mapa de asientos en tiempo real'
        description: |
            Devuelve todos los asientos de la sala asociada a la función,
            con su estado calculado en tiempo real para esa función concreta.

            **Sin autenticación requerida** (`optionalAuth`).

            Estados posibles por asiento:
            | Estado        | Significado |
            |---------------|-------------|
            | `available`   | Operativo, sin bloqueo y sin ticket vendido |
            | `locked`      | Bloqueado temporalmente en Redis (8 min — alguien en proceso de pago) |
            | `sold`        | Ticket confirmado y pagado para esta función |
            | `maintenance` | `seat_condition != 1` — asiento fuera de servicio |

            La respuesta incluye un objeto `summary` con conteos por estado
            y un array `seats` ordenado por fila y columna.

            **Ruta equivalente en contexto de sucursal:**
            `GET /cinemas/{cinemaId}/showtimes/{id}/seat-map`
        tags:
            - Cartelera
        security: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: ID del showtime
        responses:
            '200':
                description: Mapa de asientos obtenido exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Mapa de asientos obtenido exitosamente.
                                data:
                                    type: object
                                    properties:
                                        showtime_id:
                                            type: integer
                                        booking_id:
                                            type: integer
                                        room_id:
                                            type: integer
                                        start_time:
                                            type: string
                                            format: date-time
                                        end_time:
                                            type: string
                                            format: date-time
                                        summary:
                                            type: object
                                            properties:
                                                total:
                                                    type: integer
                                                    example: 120
                                                available:
                                                    type: integer
                                                    example: 85
                                                locked:
                                                    type: integer
                                                    example: 3
                                                sold:
                                                    type: integer
                                                    example: 30
                                                maintenance:
                                                    type: integer
                                                    example: 2
                                        seats:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    row:
                                                        type: string
                                                        example: C
                                                    column:
                                                        type: integer
                                                        example: 5
                                                    label:
                                                        type: string
                                                        example: C5
                                                    category:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                                nullable: true
                                                            description:
                                                                type: string
                                                                nullable: true
                                                    status:
                                                        type: string
                                                        enum:
                                                            - available
                                                            - locked
                                                            - sold
                                                            - maintenance
                                                        example: available
            '404':
                description: Función no encontrada

/cinemas/{cinemaId}/showtimes/{id}/seat-map:
    get:
        summary: 'PÚBLICO — Mapa de asientos en tiempo real (por sucursal)'
        description: |
            Idéntico a `GET /showtimes/{id}/seat-map` pero dentro del contexto
            explícito de una sucursal. Misma lógica, misma respuesta.
        tags:
            - Cartelera
        security: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: ID del showtime
        responses:
            '200':
                description: Mapa de asientos obtenido exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                showtime_id:
                                    type: integer
                                booking_id:
                                    type: integer
                                room_id:
                                    type: integer
                                start_time:
                                    type: string
                                    format: date-time
                                end_time:
                                    type: string
                                    format: date-time
                                summary:
                                    type: object
                                    properties:
                                        total:
                                            type: integer
                                        available:
                                            type: integer
                                        locked:
                                            type: integer
                                        sold:
                                            type: integer
                                        maintenance:
                                            type: integer
                                seats:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            row:
                                                type: string
                                            column:
                                                type: integer
                                            label:
                                                type: string
                                            category:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                        nullable: true
                                                    description:
                                                        type: string
                                                        nullable: true
                                            status:
                                                type: string
                                                enum:
                                                    - available
                                                    - locked
                                                    - sold
                                                    - maintenance
            '404':
                description: Función no encontrada
