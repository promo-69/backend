/showtimes/billboard:
    get:
        summary: 'PÚBLICO — Cartelera global con filtros opcionales'
        description: |
            Devuelve todas las películas en cartelera con sus funciones futuras agrupadas.
            Sin autenticación requerida.

            Filtros opcionales acumulables:
            - `projectionType` – descripción parcial o ID numérico (ej: `3D`, `IMAX`, `2`).
            - `language` – descripción parcial o ID numérico (ej: `SUB`, `doblada`, `1`).
            - `movieId` – limita la respuesta a una película concreta.
            - `cinemaId` – equivalente a la ruta `/cinemas/{cinemaId}/showtimes/billboard`.
        tags:
            - Cartelera
        security: []
        parameters:
            - in: query
              name: projectionType
              required: false
              schema:
                  type: string
              description: 'Tipo de proyección. Acepta descripción parcial o ID (ej: "3D", "IMAX")'
              example: '3D'
            - in: query
              name: language
              required: false
              schema:
                  type: string
              description: 'Idioma de la función. Acepta descripción parcial o ID (ej: "SUB", "doblada")'
              example: 'SUB'
            - in: query
              name: movieId
              required: false
              schema:
                  type: integer
              description: Filtrar por ID de película
            - in: query
              name: cinemaId
              required: false
              schema:
                  type: integer
              description: Filtrar por ID de sucursal
        responses:
            '200':
                description: Cartelera (puede estar vacía si los filtros no tienen resultados)
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                count:
                                    type: integer
                                rows:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            movie:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    title:
                                                        type: string
                                                    duration_minutes:
                                                        type: integer
                                                    poster_url:
                                                        type: string
                                                        nullable: true
                                                    lifecycle:
                                                        type: object
                                                        nullable: true
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    age_classification:
                                                        type: object
                                                        nullable: true
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    genres:
                                                        type: array
                                                        items:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                description:
                                                                    type: string
                                            showtimes:
                                                type: array
                                                items:
                                                    type: object
                                                    properties:
                                                        id:
                                                            type: integer
                                                        booking:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                start_time:
                                                                    type: string
                                                                    format: date-time
                                                                end_time:
                                                                    type: string
                                                                    format: date-time
                                                                room:
                                                                    type: object
                                                                    properties:
                                                                        id:
                                                                            type: integer
                                                                        name:
                                                                            type: string
                                                                        cinema:
                                                                            type: object
                                                                            nullable: true
                                                                            properties:
                                                                                id:
                                                                                    type: integer
                                                                                name:
                                                                                    type: string
                                                        projection_type:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                description:
                                                                    type: string
                                                        language:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                description:
                                                                    type: string
                                                        currency:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                code:
                                                                    type: string
                                                                symbol:
                                                                    type: string
                                                        price:
                                                            type: number
                                                        earned_loyalty_points:
                                                            type: integer
                                                            nullable: true
            '404':
                description: Película o sucursal no encontrada

