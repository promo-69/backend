/showtimes:
    post:
        summary: Crear función (HU-OPERATIVA-17)
        description: |
            Programa una nueva función para una película en una sala.
            Si la película estaba en estado "Próximamente", pasa automáticamente
            a "En Cartelera (Estreno)" (HU-OPERATIVA-22).
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required: [movieId, roomId, projectionTypeId, startTime, currencyId, price]
                        properties:
                            movieId:
                                type: integer
                                example: 1
                            roomId:
                                type: integer
                                example: 2
                            projectionTypeId:
                                type: integer
                                example: 1
                            startTime:
                                type: string
                                format: date-time
                                example: '2026-06-01T18:00:00Z'
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 12.50
                            earnedLoyaltyPoints:
                                type: integer
                                example: 10
        responses:
            '201':
                description: Función programada exitosamente
            '400':
                description: Validación fallida
            '409':
                description: Conflicto de horario en la sala
