/showtimes/{id}:
    get:
        summary: Get Showtime by ID
        description: |
            Retrieve a single showtime with full details.
            Required permission: **CRUD:READ:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Showtime details
            '404':
                description: Showtime not found
    patch:
        summary: Update Showtime
        description: |
            Partially update a showtime.
            Required permission: **CRUD:UPDATE:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        requestBody:
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            price:
                                type: number
                            earned_loyalty_points:
                                type: integer
        responses:
            '200':
                description: Showtime updated
    delete:
        summary: Delete Showtime
        description: |
            Cancel a showtime and free the room.
            Required permission: **CRUD:DELETE:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Showtime cancelled
            '409':
                description: Showtime has tickets
