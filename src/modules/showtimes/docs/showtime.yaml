/showtimes/{id}:
    get:
        summary: Get Showtime by ID
        description: |
            Retrieve a single showtime with full details.
            Required permission: **CRUD:READ:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Showtime details
            '404':
                description: Showtime not found
    patch:
        summary: Update Showtime
        description: |
            Partially update a showtime. Supports updating schedule (room, start_time, end_time),
            pricing and other attributes. Changing the schedule will re-validate room availability.
            Required permission: **CRUD:UPDATE:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        requestBody:
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            room:
                                type: integer
                                description: Nueva sala (dispara re-validación de solapamiento)
                            start_time:
                                type: string
                                format: date-time
                                description: Nueva hora de inicio
                            end_time:
                                type: string
                                format: date-time
                                description: Nueva hora de fin
                            projection_type:
                                type: integer
                            language:
                                type: integer
                            currency:
                                type: integer
                            price:
                                type: number
                            earned_loyalty_points:
                                type: integer
        responses:
            '200':
                description: Showtime updated
            '400':
                description: Validation error
            '404':
                description: Showtime not found
            '409':
                description: Room already booked in the new time slot
    delete:
        summary: Delete Showtime
        description: |
            Cancel a showtime and free the room.
            Required permission: **CRUD:DELETE:SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Showtime cancelled
            '409':
                description: Showtime has tickets
