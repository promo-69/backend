/rentals/admin/requests:
    get:
        summary: List All Rental Requests (Super Admin)
        description: |
            Super admin endpoint that returns all rental requests across all cinemas.
            Supports filtering by status and date range.
            Required permission: **CRUD:READ:RENTALS_GLOBAL**
        tags:
            - Rentals Admin
        security:
            - bearerAuth: []
        parameters:
            - in: query
              name: status
              schema:
                  type: integer
              description: '1=Pendiente, 2=Aprobada, 3=Pagada, 4=Rechazada, 5=Cancelada'
            - in: query
              name: startDate
              schema:
                  type: string
                  format: date
              description: Start date filter (YYYY-MM-DD)
            - in: query
              name: endDate
              schema:
                  type: string
                  format: date
              description: End date filter (YYYY-MM-DD)
            - in: query
              name: page
              schema:
                  type: integer
                  default: 1
            - in: query
              name: limit
              schema:
                  type: integer
                  default: 10
        responses:
            '200':
                description: Paginated list of all rental requests
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        count:
                                            type: integer
                                        rows:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    event_name:
                                                        type: string
                                                    requested_start_time:
                                                        type: string
                                                        format: date-time
                                                    status:
                                                        type: object
                                                        properties:
                                                            id:
                                                                type: integer
                                                            description:
                                                                type: string
                                                    customer_name:
                                                        type: string
                                                        nullable: true
                                                    customer_email:
                                                        type: string
                                                        nullable: true
                                                    cinema_name:
                                                        type: string
                                                        nullable: true
                                                    room_name:
                                                        type: string
                                                        nullable: true
                                                    price:
                                                        type: string
                                                        nullable: true
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions (requires SUPER_ADMIN)
