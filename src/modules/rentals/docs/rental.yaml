/rentals/requests/{id}/status:
    patch:
        summary: Update Rental Request Status (Manager)
        description: |
            The manager approves, rejects or cancels a rental request.

            **Approving (status: 2 — Pendiente de Pago)**
            - `currency` and `price` are **required**.
            - Atomically inserts a row in `room_bookings`. The PostgreSQL GiST exclusion
              index prevents any time overlap — if the room is already booked, a `409`
              is returned.
            - A BullMQ job is enqueued with a 48-hour TTL. If the proforma is not paid
              in time, the worker automatically cancels the request and deletes the booking.

            **Rejecting (status: 4 — Rechazada)**
            - Only from status 1 (Pendiente de Revisión). No room is blocked.

            **Cancelling (status: 5 — Cancelada)**
            - Allowed from any non-terminal status. Releases the room booking if one exists.

            Required permission: **CRUD:UPDATE:RENTALS**
        tags:
            - Rentals
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - status
                        properties:
                            status:
                                type: integer
                                description: |
                                    2 = Pendiente de Pago (approve — requires price + currency)
                                    4 = Rechazada (reject)
                                    5 = Cancelada (cancel)
                                example: 2
                            currency:
                                type: integer
                                description: Required when status = 2
                                example: 1
                            price:
                                type: string
                                description: Required when status = 2. Proforma price.
                                example: '500.00'
        responses:
            '200':
                description: Status updated. Message varies by action.
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '403':
                description: Insufficient permissions
            '404':
                description: Rental request not found in this cinema
            '409':
                description: Room already booked in that time slot (GiST exclusion constraint)
