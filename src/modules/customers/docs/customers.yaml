/customers/{id}/loyalty-points:
    patch:
        summary: Ajustar puntos de lealtad de un cliente
        description: |
            Permite a un administrador sumar o restar puntos manualmente al saldo de lealtad de un cliente.
            La operación registra el movimiento en el libro mayor (`loyalty_ledgers`) y actualiza el total en `customers.level_progress_points`.
            Requiere rol de administrador (`SUPER_ADMIN` o `CINEMA_MANAGER`).
        tags:
            - Customers (Loyalty)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: ID del cliente (tabla `customers`)
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - operation_type
                            - points
                        properties:
                            operation_type:
                                type: integer
                                description: |
                                    Tipo de operación:
                                    * `1` – Sumar puntos
                                    * `2` – Restar puntos
                                enum: [1, 2]
                            points:
                                type: integer
                                description: Cantidad de puntos a sumar o restar (debe ser un entero positivo)
                                minimum: 1
        responses:
            '200':
                description: Puntos ajustados exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: null
            '400':
                description: |
                    Error de validación. Puede deberse a:
                    - `operation_type` o `points` faltantes
                    - `points` no es un entero positivo
            '401':
                description: No autorizado (token inválido o faltante)
            '403':
                description: Permisos insuficientes (no es administrador)
            '404':
                description: Cliente no encontrado
            '500':
                description: Error interno del servidor

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
