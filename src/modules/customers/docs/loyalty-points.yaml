/customers/{id}/loyalty-points:
    patch:
        summary: Adjust Loyalty Points (Admin)
        description: |
            Manually increments or decrements a customer's loyalty points.
            The operation is atomic and includes row-level locking to prevent
            race conditions. The loyalty level is automatically recalculated
            based on the new point total. An entry in the loyalty ledger is
            recorded for auditing.
        tags:
            - Customers
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: Customer ID
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - operationType
                            - points
                        properties:
                            operationType:
                                type: integer
                                enum: [1, 2]
                                description: '1 = increment, 2 = decrement'
                                example: 1
                            points:
                                type: integer
                                minimum: 1
                                example: 100
                            remarks:
                                type: string
                                description: Optional note for the ledger entry
                                example: 'Customer support adjustment'
        responses:
            '200':
                description: Loyalty points adjusted successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '404':
                description: Customer not found
            '500':
                description: Internal server error
