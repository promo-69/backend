/room-events:
    get:
        summary: List Room Events (Implicit)
        description: |
            Returns all alternative events (non-movie) for the authenticated user's cinema.
            Required permission: **CRUD:READ:ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        responses:
            '200':
                description: List of events
            '401':
                description: Unauthorized
    post:
        summary: Create Room Event (Implicit)
        description: |
            Schedule a new alternative event in the authenticated user's cinema.
            Required permission: **CRUD:CREATE:ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - room
                            - event_type
                            - name
                            - organizer
                            - start_time
                            - end_time
                            - currency
                        properties:
                            room:
                                type: integer
                                example: 2
                            event_type:
                                type: integer
                                example: 3
                            name:
                                type: string
                                example: Final Nacional League of Legends
                            organizer:
                                type: string
                                example: Gaming Corp
                            description:
                                type: string
                                example: Transmisión en vivo con narradores invitados.
                            start_time:
                                type: string
                                format: date-time
                                example: '2026-07-10T15:00:00Z'
                            end_time:
                                type: string
                                format: date-time
                                example: '2026-07-10T18:00:00Z'
                            currency:
                                type: integer
                                example: 2
                            price:
                                type: number
                                example: 10.00
        responses:
            '201':
                description: Event created
            '400':
                description: Validation error
            '409':
                description: Room already booked

/room-events/{id}:
    get:
        summary: Get Room Event by ID
        description: |
            Retrieve a single alternative event.
            Required permission: **CRUD:READ:ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Event details
            '404':
                description: Event not found
    patch:
        summary: Update Room Event
        description: |
            Partially update an event.
            Required permission: **CRUD:UPDATE:ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            organizer:
                                type: string
                            price:
                                type: number
                            description:
                                type: string
        responses:
            '200':
                description: Event updated
    delete:
        summary: Delete Room Event
        description: |
            Cancel an event and free the room.
            Required permission: **CRUD:DELETE:ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Event cancelled
            '409':
                description: Event has tickets

/cinemas/{cinemaId}/room-events:
    get:
        summary: List Room Events by Cinema (Explicit)
        description: |
            Returns all alternative events for a specific cinema.
            Required permission: **CRUD:READ:CINEMAS-ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: List of events
    post:
        summary: Create Room Event for Cinema (Explicit)
        description: |
            Schedule a new alternative event in a specific cinema.
            Required permission: **CRUD:CREATE:CINEMAS-ROOM-EVENTS**
        tags:
            - Room Events
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - room
                            - event_type
                            - name
                            - organizer
                            - start_time
                            - end_time
                            - currency
                        properties:
                            room:
                                type: integer
                                example: 2
                            event_type:
                                type: integer
                                example: 4
                            name:
                                type: string
                                example: Conferencia Anual Cineflix
                            organizer:
                                type: string
                                example: Cineflix Corp
                            description:
                                type: string
                                example: Reunión anual de accionistas.
                            start_time:
                                type: string
                                format: date-time
                                example: '2026-08-01T09:00:00Z'
                            end_time:
                                type: string
                                format: date-time
                                example: '2026-08-01T13:00:00Z'
                            currency:
                                type: integer
                                example: 2
                            price:
                                type: number
                                example: 0.00
        responses:
            '201':
                description: Event created
