/seats/{id}:
    patch:
        summary: Update Seat
        description: Update the condition or category of a seat. Cannot modify a seat that has future sold tickets.
        tags:
            - Seats
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            seatCondition:
                                type: integer
                                example: 3
                            seatCategory:
                                type: integer
                                example: 2
        responses:
            '200':
                description: Seat updated successfully
            '400':
                description: Bad request (no fields provided)
            '401':
                description: Unauthorized
            '404':
                description: Seat not found
            '409':
                description: Conflict — seat has future sold tickets
            '500':
                description: Internal server error
    delete:
        summary: Delete Seat
        description: Soft-delete a seat. Cannot delete a seat that has future sold tickets.
        tags:
            - Seats
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Seat deleted successfully
            '401':
                description: Unauthorized
            '404':
                description: Seat not found
            '409':
                description: Conflict — seat has future sold tickets
            '500':
                description: Internal server error
