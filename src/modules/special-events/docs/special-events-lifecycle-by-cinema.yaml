/special-events/by-cinema/{cinemaId}/upcoming:
    get:
        summary: Get upcoming special events by cinema (lifecycle=1)
        tags:
            - Special Events
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: List of upcoming events in the cinema

/special-events/by-cinema/{cinemaId}/premiere:
