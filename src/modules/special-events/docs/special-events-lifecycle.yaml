/special-events/upcoming:
    get:
        summary: Get upcoming special events
        description: |
            Retrieve special events with lifecycle_state = 1 (Próximamente).
            Supports pagination.
        tags:
            - Special Events
        security: []
        parameters:
            - in: query
              name: page
              schema:
                  type: integer
            - in: query
              name: limit
              schema:
                  type: integer
        responses:
            '200':
                description: List of upcoming events
            '500':
                description: Internal server error

