/movies:
    get:
        summary: Get All Movies
        description: Retrieve a paginated list of all movies in the catalog, including their related genres, languages, and projection types.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              description: Page number for pagination
              schema:
                  type: integer
            - name: limit
              in: query
              description: Number of items per page
              schema:
                  type: integer
        responses:
            '200':
                description: List of movies retrieved successfully
            '500':
                description: Internal server error
    post:
        summary: Create Movie
        description: Register a new movie in the catalog. Requires SUPER_ADMIN or GENERAL_MANAGER role. Supports multipart/form-data for uploading poster and banner images.
        tags:
            - Movies
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        properties:
                            title:
                                type: string
                            durationMinutes:
                                type: integer
                            ageClassification:
                                type: integer
                            lifecycleState:
                                type: integer
                            synopsis:
                                type: string
                            releaseDate:
                                type: string
                                format: date
                            trailerUrl:
                                type: string
                                format: uri
                            genres:
                                type: array
                                items:
                                    type: integer
                            languages:
                                type: array
                                items:
                                    type: integer
                            projectionTypes:
                                type: array
                                items:
                                    type: integer
                            poster:
                                type: string
                                format: binary
                            banner:
                                type: string
                                format: binary
                        required:
                            - title
                            - durationMinutes
                            - ageClassification
                            - lifecycleState
                            - synopsis
                            - releaseDate
                            - genres
                            - languages
                            - projectionTypes
        responses:
            '201':
                description: Movie created successfully
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '403':
                description: Forbidden (insufficient permissions)
            '409':
                description: Conflict (Movie title already exists)
            '500':
                description: Internal server error

/movies/showtimes:
    get:
        summary: Get Movies with Showtimes
        description: Retrieve a paginated list of movies that currently have scheduled showtimes (cartelera).
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              description: Page number for pagination
              schema:
                  type: integer
            - name: limit
              in: query
              description: Number of items per page
              schema:
                  type: integer
        responses:
            '200':
                description: List of movies with active showtimes retrieved successfully
            '500':
                description: Internal server error

/movies/{id}:
    get:
        summary: Get Movie by ID
        description: Retrieve detailed information about a specific movie, including relationships.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Movie found
            '404':
                description: Movie not found
            '500':
                description: Internal server error
    patch:
        summary: Update Movie
        description: Update movie details. Requires SUPER_ADMIN or GENERAL_MANAGER role. Supports multipart/form-data.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        properties:
                            lifecycleState:
                                type: integer
                            synopsis:
                                type: string
                            trailerUrl:
                                type: string
                                format: uri
                            genres:
                                type: array
                                items:
                                    type: integer
                            languages:
                                type: array
                                items:
                                    type: integer
                            projectionTypes:
                                type: array
                                items:
                                    type: integer
                            poster:
                                type: string
                                format: binary
                            banner:
                                type: string
                                format: binary
        responses:
            '200':
                description: Movie updated successfully
            '400':
                description: Validation error or no fields provided
            '401':
                description: Unauthorized
            '403':
                description: Forbidden (insufficient permissions)
            '404':
                description: Movie not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Movie
        description: Soft-delete a movie from the catalog. Cannot delete a movie that has active future showtimes. Requires SUPER_ADMIN or GENERAL_MANAGER role.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Movie deleted successfully
            '401':
                description: Unauthorized
            '403':
                description: Forbidden (insufficient permissions)
            '404':
                description: Movie not found
            '409':
                description: Conflict (Movie has active future showtimes)
            '500':
                description: Internal server error
