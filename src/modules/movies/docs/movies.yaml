/movies:
  get:
    summary: Obtener cartelera de películas
    description: Retorna la lista de películas activas (`status=1`) con ciclo de vida apto para el público (Ej. "En Cartelera" o "Próximamente"). Endpoint público (autenticación opcional).
    tags:
      - Movies
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Número de página
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
        description: Cantidad de registros por página
      - name: state
        in: query
        schema:
          type: integer
        description: Filtro por `lifecycle_state` (ej. 1=Próximamente, 2=En Cartelera)
      - name: genre
        in: query
        schema:
          type: integer
        description: Filtro por ID de género
    responses:
      '200':
        description: Lista de películas
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Movie'
                metadata:
                  type: object
      '500':
        description: Error interno

/movies/cartelera:
  get:
    summary: Obtener cartelera (alias)
    description: Endpoint alternativo a `GET /movies`. Retorna la misma información. Público.
    tags:
      - Movies
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
    responses:
      '200':
        description: Lista de películas
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Movie'
                metadata:
                  type: object
      '500':
        description: Error interno

/movies/{id}:
  get:
    summary: Obtener detalle de una película
    description: Retorna información extendida de una película específica (sinopsis, tráiler, géneros, clasificación). Endpoint público.
    tags:
      - Movies
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la película
    responses:
      '200':
        description: Película encontrada
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  $ref: '#/components/schemas/MovieDetail'
      '404':
        description: Película no encontrada
      '500':
        description: Error interno

  put:
    summary: Editar una película
    description: |
      Actualiza los datos de una película existente. Permite cambiar el estado de ciclo de vida, sinopsis, URLs de imágenes y trailer, y los géneros asociados.
      Requiere rol de administrador (`SUPER_ADMIN` o `CINEMA_MANAGER`).
    tags:
      - Movies (Admin)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              lifecycle_state:
                type: integer
                description: ID del estado del ciclo de vida (1=Próximamente, 2=En Cartelera)
              synopsis:
                type: string
              poster_url:
                type: string
              banner_url:
                type: string
              trailer_url:
                type: string
              genres:
                type: array
                items:
                  type: integer
                description: IDs de géneros (reemplaza la lista existente)
    responses:
      '200':
        description: Película actualizada
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: null
      '400':
        description: Error de validación (campos incorrectos, géneros no existen, etc.)
      '401':
        description: No autorizado (token inválido o faltante)
      '403':
        description: Permisos insuficientes (no es administrador)
      '404':
        description: Película no encontrada
      '500':
        description: Error interno

  delete:
    summary: Desactivar una película (soft delete)
    description: Marca la película como eliminada lógicamente (status=4). No se permite si tiene funciones futuras activas. Requiere rol `SUPER_ADMIN`.
    tags:
      - Movies (Admin)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Película retirada del catálogo
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: null
      '401':
        description: No autorizado
      '403':
        description: Permisos insuficientes
      '404':
        description: Película no encontrada
      '409':
        description: Conflicto – la película tiene funciones futuras activas
      '500':
        description: Error interno

/movies:
  post:
    summary: Registrar una nueva película
    description: |
      Crea una película en el catálogo. Se deben proporcionar todos los metadatos obligatorios: título, duración, clasificación de edad, estado de ciclo de vida, sinopsis, fecha de estreno y al menos un género.
      Requiere rol de administrador (`SUPER_ADMIN` o `CINEMA_MANAGER`).
    tags:
      - Movies (Admin)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - title
              - duration_minutes
              - age_classification
              - lifecycle_state
              - synopsis
              - release_date
              - genres
            properties:
              title:
                type: string
                description: Título único de la película
              duration_minutes:
                type: integer
                description: Duración en minutos (mayor a 0)
              age_classification:
                type: integer
                description: ID de clasificación por edad (ej. 1=AA, 2=A, 3=B, etc.)
              lifecycle_state:
                type: integer
                description: Estado del ciclo de vida (1=Próximamente, 2=En Cartelera)
              synopsis:
                type: string
              poster_url:
                type: string
                nullable: true
              banner_url:
                type: string
                nullable: true
              trailer_url:
                type: string
                nullable: true
              release_date:
                type: string
                format: date
              genres:
                type: array
                items:
                  type: integer
                description: Lista de IDs de géneros (mínimo uno)
    responses:
      '201':
        description: Película registrada exitosamente
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  type: object
                  properties:
                    movie_id:
                      type: integer
                    title:
                      type: string
      '400':
        description: Error de validación (campos faltantes, título duplicado, género no existe, etc.)
      '401':
        description: No autorizado
      '403':
        description: Permisos insuficientes
      '500':
        description: Error interno

components:
  schemas:
    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        duration_minutes:
          type: integer
        age_classification:
          type: integer
        lifecycle_state:
          type: integer
        synopsis:
          type: string
        poster_url:
          type: string
          nullable: true
        banner_url:
          type: string
          nullable: true
        trailer_url:
          type: string
          nullable: true
        release_date:
          type: string
          format: date
        status:
          type: integer
        _AgeClassification:
          type: object
          properties:
            description:
              type: string
        _LifecycleState:
          type: object
          properties:
            description:
              type: string
        _Status:
          type: object
          properties:
            description:
              type: string
        _MovieGenres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              genre:
                type: integer
              _Genre:
                type: object
                properties:
                  description:
                    type: string
    MovieDetail:
      allOf:
        - $ref: '#/components/schemas/Movie'
        - type: object
          properties:
            _AgeClassification: {}
            _LifecycleState: {}
            _Status: {}
            _MovieGenres:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  genre:
                    type: integer
                  _Genre:
                    type: object
                    properties:
                      description:
                        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
