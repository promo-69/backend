/movies:
    get:
        summary: List All Movies
        description: Retrieve all movies in the catalog with optional filters and pagination.
        tags:
            - Movies
        parameters:
            - in: query
              name: page
              schema:
                  type: integer
                  default: 1
              description: Page number
            - in: query
              name: per_page
              schema:
                  type: integer
                  default: 10
              description: Items per page
            - in: query
              name: sort
              schema:
                  type: string
              description: Not directly supported by the API; use order.<field>=asc|desc instead (e.g. order.title=asc).
            - in: query
              name: filter
              schema:
                  type: string
              description: Not directly supported by the API; use qc.<field>=<value> instead (e.g. qc.lifecycle_state=1).
        responses:
            '200':
                description: A paginated list of movies
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Operation completed successfully
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            title:
                                                type: string
                                            duration_minutes:
                                                type: integer
                                            age_classification:
                                                type: integer
                                            lifecycle_state:
                                                type: integer
                                            synopsis:
                                                type: string
                                            trailer_url:
                                                type: string
                                                nullable: true
                                            poster_url:
                                                type: string
                                                nullable: true
                                            banner_url:
                                                type: string
                                                nullable: true
                                            release_date:
                                                type: string
                                                format: date
                                            deleted_at:
                                                type: string
                                                format: date-time
                                                nullable: true
                                            _MovieGenres:
                                                type: array
                                                items:
                                                    type: object
                                                    properties:
                                                        id:
                                                            type: integer
                                                        genre:
                                                            type: integer
                                metadata:
                                    type: object
                                    properties:
                                        total:
                                            type: integer
                                        per_page:
                                            type: integer
                                        current_page:
                                            type: integer
                                        total_pages:
                                            type: integer
                                        next_page:
                                            type: integer
                                            nullable: true
                                        prev_page:
                                            type: integer
                                            nullable: true
            '500':
                description: Internal server error
    post:
        summary: Create Movie
        description: Register a new movie in the catalog. Requires admin role (SUPER_ADMIN or CINEMA_MANAGER).
        tags:
            - Movies
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        required:
                            - title
                            - durationMinutes
                            - ageClassification
                            - lifecycleState
                            - synopsis
                            - releaseDate
                            - genres
                        properties:
                            title:
                                type: string
                                example: Zootopia 2
                            durationMinutes:
                                type: integer
                                example: 120
                            ageClassification:
                                type: integer
                                example: 1
                            lifecycleState:
                                type: integer
                                example: 1
                            synopsis:
                                type: string
                                example: A new adventure in the animal city.
                            releaseDate:
                                type: string
                                format: date
                                example: 2026-06-15
                            trailerUrl:
                                type: string
                                format: url
                                example: https://www.youtube.com/watch?v=5AwtptT8X8k
                            genres:
                                type: string
                                description: JSON array of genre IDs (e.g., "[1,2]")
                                example: '[1, 2]'
                            poster:
                                type: string
                                format: binary
                                description: Poster image file (JPEG, PNG, WebP)
                            banner:
                                type: string
                                format: binary
                                description: Banner image file (JPEG, PNG, WebP)
                            posterUrl:
                                type: string
                                format: uri
                                description: Optional remote poster URL to use when no poster file is uploaded.
                            bannerUrl:
                                type: string
                                format: uri
                                description: Optional remote banner URL to use when no banner file is uploaded.
        responses:
            '201':
                description: Movie created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Película registrada exitosamente en el catálogo.
                                data:
                                    type: object
                                    properties:
                                        movie_id:
                                            type: integer
                                            example: 10
                                        title:
                                            type: string
                                            example: Zootopia 2
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate title
            '500':
                description: Internal server error
