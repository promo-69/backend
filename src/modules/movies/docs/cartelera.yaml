/movies/cartelera:
    get:
        summary: Get Billboard
        description: Retrieve movies currently on the billboard (public cartelera). Same data as the main list but dedicated to public display.
        tags:
            - Movies
        parameters:
            - in: query
              name: page
              schema:
                  type: integer
                  default: 1
              description: Page number
            - in: query
              name: per_page
              schema:
                  type: integer
                  default: 10
              description: Items per page
        responses:
            '200':
                description: Billboard list
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Cartelera obtenida exitosamente
                                data:
                                    type: object
                                    properties:
                                        rows:
                                            type: array
                                            items:
                                                type: object
                                                properties:
                                                    id:
                                                        type: integer
                                                    title:
                                                        type: string
                                                    duration_minutes:
                                                        type: integer
                                                    age_classification:
                                                        type: integer
                                                    lifecycle_state:
                                                        type: integer
                                                    synopsis:
                                                        type: string
                                                    trailer_url:
                                                        type: string
                                                        nullable: true
                                                    poster_url:
                                                        type: string
                                                        nullable: true
                                                    banner_url:
                                                        type: string
                                                        nullable: true
                                                    release_date:
                                                        type: string
                                                        format: date
                                                    deleted_at:
                                                        type: string
                                                        format: date-time
                                                        nullable: true
                                                    _MovieGenres:
                                                        type: array
                                                        items:
                                                            type: object
                                                            properties:
                                                                id:
                                                                    type: integer
                                                                genre:
                                                                    type: integer
                                        count:
                                            type: integer
                                            example: 3
            '500':
                description: Internal server error
