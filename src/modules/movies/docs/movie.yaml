/movies/{id}:
    get:
        summary: Get Movie By ID
        description: Retrieve full details of a single movie.
        tags:
            - Movies
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Movie ID
        responses:
            '200':
                description: Movie details
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Película obtenida exitosamente
                                data:
                                    $ref: '#/components/schemas/MovieDetail'
            '404':
                description: Movie not found
            '500':
                description: Internal server error
    put:
        summary: Update Movie
        description: Update movie metadata and optionally replace images. Requires admin role.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Movie ID
        requestBody:
            required: true
            content:
                multipart/form-data:
                    schema:
                        type: object
                        properties:
                            lifecycleState:
                                type: integer
                                example: 2
                            synopsis:
                                type: string
                                example: Updated synopsis.
                            trailerUrl:
                                type: string
                                format: url
                                example: https://www.youtube.com/watch?v=updated
                            genres:
                                type: string
                                description: JSON array of genre IDs (replaces existing genres)
                                example: '[2, 3]'
                            poster:
                                type: string
                                format: binary
                                description: New poster image
                            banner:
                                type: string
                                format: binary
                                description: New banner image
        responses:
            '200':
                description: Movie updated successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Datos de la película actualizados exitosamente.
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: Movie not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Movie
        description: Remove a movie from the catalog (soft delete). Requires admin role and no active future showtimes.
        tags:
            - Movies
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: integer
              description: Movie ID
        responses:
            '200':
                description: Movie removed successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Película retirada del catálogo exitosamente.
            '401':
                description: Unauthorized
            '404':
                description: Movie not found
            '409':
                description: Conflict — movie has active showtimes
            '500':
                description: Internal server error
