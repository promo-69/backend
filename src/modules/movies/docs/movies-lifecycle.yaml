/movies/upcoming:
    get:
        summary: Get upcoming movies
        description: |
            Retrieve movies with lifecycle_state = 1 (Próximamente).
            Supports pagination via page and limit query parameters.
        tags:
            - Movies
        security: []
        parameters:
            - in: query
              name: page
              schema:
                  type: integer
              description: Page number
            - in: query
              name: limit
              schema:
                  type: integer
              description: Items per page
        responses:
            '200':
                description: List of upcoming movies
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Películas obtenidas exitosamente
                                data:
                                    type: object
                                    properties:
                                        count:
                                            type: integer
                                        rows:
                                            type: array
                                            items:
                                                type: object
            '500':
                description: Internal server error

