/auth/forgot-password:
    post:
        summary: Forgot Password
        description: Endpoint to request a password reset code sent to the user's email.
        tags:
            - Auth
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                        required:
                            - email
        responses:
            '200':
                description: Password reset code sent
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Código de restablecimiento enviado a tu correo electrónico
            '400':
                description: Bad request (validation errors)
            '500':
                description: Internal server error