/auth/reset-password:
    post:
        summary: Reset Password
        description: Endpoint to reset the user's password using the verified reset token.
        tags:
            - Auth
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                            resetToken:
                                type: string
                            newPassword:
                                type: string
                                format: password
                        required:
                            - email
                            - resetToken
                            - newPassword
        responses:
            '200':
                description: Password reset successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Contraseña restablecida exitosamente
            '400':
                description: Bad request (validation errors)
            '500':
                description: Internal server error