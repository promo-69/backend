/auth/login:
    post:
        summary: User Login
        description: Endpoint para autenticar un cliente. Si la solicitud llega con cookie, los tokens se entregan en cookies seguras; si llega con bearer, se devuelven en la respuesta y en el header Authorization.
        tags:
            - Auth
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                            password:
                                type: string
                                format: password
                        required:
                            - email
                            - password
        responses:
            '200':
                description: Authentication successful
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Autenticación exitosa
                                data:
                                    type: object
                                    properties:
                                        user:
                                            type: object
                                            properties:
                                                userId:
                                                    type: string
                                                documentNumber:
                                                    type: string
                                                cinemaId:
                                                    type: string
                                                email:
                                                    type: string
                                                firstName:
                                                    type: string
                                                lastName:
                                                    type: string
                                        tokens:
                                            type: object
                                            properties:
                                                accessToken:
                                                    type: string
                                                refreshToken:
                                                    type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
