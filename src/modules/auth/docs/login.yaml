/auth/login:
    post:
        summary: Customer Login
        description: Endpoint for customer authentication. Only users with user_type = 2 (customer) are allowed. Returns tokens based on client channel (cookie for web, bearer for mobile).
        tags:
            - Auth
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                            password:
                                type: string
                                format: password
                        required:
                            - email
                            - password
        responses:
            '200':
                description: Authentication successful
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Autenticación exitosa
                                data:
                                    type: object
                                    properties:
                                        user:
                                            type: object
                                            properties:
                                                userId:
                                                    type: string
                                                documentNumber:
                                                    type: string
                                                email:
                                                    type: string
                                                firstName:
                                                    type: string
                                                lastName:
                                                    type: string
                                                personalEmail:
                                                    type: string
                                                    nullable: true
                                                phoneNumber:
                                                    type: string
                                                    nullable: true
                                                loyaltyLevelId:
                                                    type: integer
                                                    nullable: true
                                                    description: Customer loyalty level ID (e.g. 1=Bronze, 2=Silver...)
                                                loyaltyLevelName:
                                                    type: string
                                                    nullable: true
                                                    description: Customer loyalty level name
                                                loyaltyPoints:
                                                    type: integer
                                                    nullable: true
                                                    description: Customer accumulated loyalty points
                                        tokens:
                                            type: object
                                            description: Only present when x-client-channel is 'mobile'. Omitted for 'web' (tokens go into cookies).
                                            properties:
                                                accessToken:
                                                    type: string
                                                refreshToken:
                                                    type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
