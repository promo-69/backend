/auth/refresh:
    post:
        summary: Refresh Session
        description: Endpoint para renovar la sesión usando el refresh token. Si la solicitud llega con refresh token en cookie, los nuevos tokens se entregan en cookies seguras; si llega con bearer, se devuelven en la respuesta y en el header Authorization.
        tags:
            - Auth
        security:
            - bearerAuth: []
            - cookieAuth: []
        responses:
            '200':
                description: Session refreshed successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Sesión renovada
                                data:
                                    type: object
                                    properties:
                                        user:
                                            type: object
                                            properties:
                                                userId:
                                                    type: string
                                                documentNumber:
                                                    type: string
                                                cinemaId:
                                                    type: string
                                                email:
                                                    type: string
                                                firstName:
                                                    type: string
                                                lastName:
                                                    type: string
                                        tokens:
                                            type: object
                                            properties:
                                                accessToken:
                                                    type: string
                                                refreshToken:
                                                    type: string
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
