/auth/refresh:
    post:
        summary: Refresh Session
        description: |
            Refresh the access token using a valid refresh token.
            For mobile clients: send the refresh token via Authorization Bearer header.
            For web clients: the refresh token is read automatically from the httpOnly cookie.
        tags:
            - Auth
        security:
            - bearerAuth: []
            - cookieAuth: []
        responses:
            '200':
                description: Session refreshed successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Sesión renovada
                                data:
                                    type: object
                                    properties:
                                        user:
                                            type: object
                                            description: Rebuilt session payload — fields depend on user type.
                                            properties:
                                                userId:
                                                    type: string
                                                documentNumber:
                                                    type: string
                                                email:
                                                    type: string
                                                firstName:
                                                    type: string
                                                lastName:
                                                    type: string
                                                roleCode:
                                                    type: string
                                                    nullable: true
                                                    description: Present for employees only
                                                permissions:
                                                    type: array
                                                    items:
                                                        type: string
                                                    description: Present for employees only
                                                cinemaId:
                                                    type: string
                                                    nullable: true
                                                    description: Present for employees only
                                                loyaltyLevelId:
                                                    type: integer
                                                    nullable: true
                                                    description: Present for customers only
                                                loyaltyLevelName:
                                                    type: string
                                                    nullable: true
                                                    description: Present for customers only
                                                loyaltyPoints:
                                                    type: integer
                                                    nullable: true
                                                    description: Present for customers only
                                        tokens:
                                            type: object
                                            description: Only present for mobile clients (bearer transport).
                                            properties:
                                                accessToken:
                                                    type: string
                                                refreshToken:
                                                    type: string
            '401':
                description: Unauthorized (invalid or expired refresh token)
            '500':
                description: Internal server error
