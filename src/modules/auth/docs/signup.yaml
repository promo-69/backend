/auth/signup:
    post:
        summary: User Signup
        description: Endpoint for creating a new user (customer) account.
        tags:
            - Auth
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            email:
                                type: string
                                format: email
                            password:
                                type: string
                                format: password
                            firstName:
                                type: string
                            lastName:
                                type: string
                        required:
                            - email
                            - password
                            - firstName
                            - lastName
        responses:
            '201':
                description: User created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: User account created successfully
            '400':
                description: Bad request (validation errors)
            '500':
                description: Internal server error
