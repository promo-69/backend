/auth/profile:
    patch:
        summary: Actualizar perfil del usuario autenticado
        description: |
            Permite modificar datos personales del cliente (teléfono, fecha de nacimiento, nombre o apellido).
            **No permite** cambiar email, contraseña ni correo personal (seguridad).
            Requiere autenticación.
        tags:
            - Auth (Profile)
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            phone_number:
                                type: string
                                description: Número de teléfono (formato libre, ej. +584141234567)
                                example: '+584141234567'
                            birth_date:
                                type: string
                                format: date
                                description: Fecha de nacimiento (YYYY-MM-DD)
                                example: '1995-05-15'
                            first_name:
                                type: string
                                description: Primer nombre
                                example: 'Gloria'
                            last_name:
                                type: string
                                description: Apellido
                                example: 'Sans'
                        minProperties: 1
                        additionalProperties: false
        responses:
            '200':
                description: Perfil actualizado exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: 'Perfil actualizado.'
                                data:
                                    type: null
            '400':
                description: Error de validación (por ejemplo, intentar cambiar email o contraseña)
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                message:
                                    type: string
                                code:
                                    type: string
            '401':
                description: No autenticado (token inválido o faltante)
            '500':
                description: Error interno del servidor

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
