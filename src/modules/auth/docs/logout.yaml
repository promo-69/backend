/auth/logout:
    post:
        summary: User Logout
        description: Endpoint para cerrar sesión y revocar tokens. Si se recibe cookie, las cookies se eliminan; si se recibe bearer, solo se revocan los tokens en servidor.
        tags:
            - Auth
        security:
            - bearerAuth: []
            - cookieAuth: []
        responses:
            '200':
                description: Logout successful
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    example: Sesión finalizada exitosamente
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
