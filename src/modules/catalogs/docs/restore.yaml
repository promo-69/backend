/catalogs/{catalogName}/{id}/restore:
    patch:
        summary: Restore Catalog Record
        description: Restores a soft-deleted record in a specific catalog.
        tags:
            - Catalogs
        parameters:
            - in: path
              name: catalogName
              required: true
              schema:
                  type: string
              description: The name of the catalog
            - in: path
              name: id
              required: true
              schema:
                  type: string
              description: The ID of the record
        responses:
            '204':
                description: Record restored successfully
            '400':
                description: Bad request
            '404':
                description: Catalog or record not found
            '500':
                description: Internal server error
