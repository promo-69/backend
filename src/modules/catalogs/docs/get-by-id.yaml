/catalogs/{catalogName}/{id}:
    get:
        summary: Get Catalog Record by ID
        description: Returns a specific record from a catalog by its ID.
        tags:
            - Catalogs
        parameters:
            - in: path
              name: catalogName
              required: true
              schema:
                  type: string
              description: The name of the catalog
            - in: path
              name: id
              required: true
              schema:
                  type: string
              description: The ID of the record
            - in: query
              name: include
              schema:
                  type: boolean
              description: Whether to include relational data
            - in: query
              name: includeDeleted
              schema:
                  type: boolean
              description: Whether to include soft-deleted records
        responses:
            '200':
                description: Successful response
                content:
                    application/json:
                        schema:
                            type: object
            '400':
                description: Bad request
            '404':
                description: Catalog or record not found
            '500':
                description: Internal server error
