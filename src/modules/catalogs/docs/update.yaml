/catalogs/{catalogName}/{id}:
    patch:
        summary: Update Catalog Record
        description: Updates an existing record in a specific catalog.
        tags:
            - Catalogs
        parameters:
            - in: path
              name: catalogName
              required: true
              schema:
                  type: string
              description: The name of the catalog
            - in: path
              name: id
              required: true
              schema:
                  type: string
              description: The ID of the record
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        description: Partial key-value pairs matching the catalog metadata schema
        responses:
            '200':
                description: Record updated successfully
                content:
                    application/json:
                        schema:
                            type: object
            '400':
                description: Bad request (validation errors)
            '404':
                description: Catalog or record not found
            '500':
                description: Internal server error
