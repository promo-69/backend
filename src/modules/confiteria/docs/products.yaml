/confiteria/products:
    get:
        summary: Listar productos de confitería
        tags: [Confiteria]
        responses:
            '200':
                description: Lista de productos
    post:
        summary: Registrar producto (HU-OPERATIVA-29)
        tags: [Confiteria]
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required: [name, sku, productCategory, currencyId, price]
                        properties:
                            name:
                                type: string
                                example: 'Palomitas grandes'
                            sku:
                                type: string
                                example: 'POP-LG-001'
                            productCategory:
                                type: integer
                                example: 1
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 5.50
                            earnedLoyaltyPoints:
                                type: integer
                                example: 5
        responses:
            '201':
                description: Producto registrado exitosamente
            '409':
                description: SKU duplicado
/confiteria/combos:
    post:
        summary: Crear combo (HU-OPERATIVA-30)
        tags: [Confiteria]
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required: [name, sku, description, currencyId, price, products]
                        properties:
                            name:
                                type: string
                                example: 'Combo Familiar'
                            sku:
                                type: string
                                example: 'CMB-FAM-001'
                            description:
                                type: string
                            currencyId:
                                type: integer
                                example: 1
                            price:
                                type: number
                                example: 15.00
                            products:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        productId:
                                            type: integer
                                        quantity:
                                            type: integer
        responses:
            '201':
                description: Combo creado exitosamente
/confiteria/inventory/{cinemaId}/products/{productId}/replenish:
    post:
        summary: Registrar reposición de inventario (HU-OPERATIVA-34)
        tags: [Confiteria]
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
            - in: path
              name: productId
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required: [quantity]
                        properties:
                            quantity:
                                type: integer
                                example: 100
                            remarks:
                                type: string
                                example: 'Reposición mensual'
        responses:
            '201':
                description: Reposición registrada exitosamente
