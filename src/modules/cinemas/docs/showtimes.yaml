/cinemas/{cinemaId}/showtimes:
    get:
        summary: List Showtimes by Cinema (Explicit)
        description: |
            Returns all showtimes for a specific cinema.
            Required permission: **CRUD:READ:CINEMAS-SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: List of showtimes
    post:
        summary: Create Showtime for Cinema (Explicit)
        description: |
            Schedule a new showtime in a specific cinema.
            Required permission: **CRUD:CREATE:CINEMAS-SHOWTIMES**
        tags:
            - Showtimes
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: cinemaId
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - room
                            - movie
                            - projection_type
                            - start_time
                            - end_time
                            - currency
                        properties:
                            room:
                                type: integer
                                example: 4
                            movie:
                                type: integer
                                example: 12
                            projection_type:
                                type: integer
                                example: 2
                            start_time:
                                type: string
                                format: date-time
                                example: '2026-06-15T18:00:00Z'
                            end_time:
                                type: string
                                format: date-time
                                example: '2026-06-15T20:15:00Z'
                            currency:
                                type: integer
                                example: 2
                            price:
                                type: number
                                example: 5.00
                            earned_loyalty_points:
                                type: integer
                                example: 10
        responses:
            '201':
                description: Showtime created
