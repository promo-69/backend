/cinemas:
    get:
        summary: List Cinemas
        description: Retrieve all active cinema locations registered in the system.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        responses:
            '200':
                description: A list of cinemas
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            address:
                                                type: string
                                                nullable: true
                                            phone:
                                                type: string
                                                nullable: true
                                            opening_time:
                                                type: string
                                                example: '10:00'
                                            closing_time:
                                                type: string
                                                example: '22:00'
                                            status:
                                                type: integer
                                            created_at:
                                                type: string
                                                format: date-time
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Cinema
        description: Register a new cinema location. Name must be unique across active locations.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - openingTime
                            - closingTime
                        properties:
                            name:
                                type: string
                                example: Cineflix Barquisimeto
                            address:
                                type: string
                                example: Av. Libertador, CC Sambil
                                nullable: true
                            phone:
                                type: string
                                example: '0251-1234567'
                                nullable: true
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '10:00'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '22:00'
        responses:
            '201':
                description: Cinema created successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
            '400':
                description: Bad request (validation errors)
            '401':
                description: Unauthorized
            '409':
                description: Conflict — duplicate cinema name
            '500':
                description: Internal server error
