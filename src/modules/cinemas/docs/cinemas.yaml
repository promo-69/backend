/cinemas:
    get:
        summary: List All Cinemas
        description: Public endpoint. Returns all active cinemas.
        tags:
            - Cinemas
        responses:
            '200':
                description: A list of cinemas
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            address:
                                                type: string
                                            phone:
                                                type: string
                                            opening_time:
                                                type: string
                                            closing_time:
                                                type: string
                                            active:
                                                type: boolean
            '500':
                description: Internal server error
    post:
        summary: Create Cinema
        description: Register a new cinema. Requires admin role.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - openingTime
                            - closingTime
                        properties:
                            name:
                                type: string
                                example: Cinex Norte
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '09:00'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '23:00'
        responses:
            '201':
                description: Cinema created
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '409':
                description: Duplicate name
            '500':
                description: Internal server error
