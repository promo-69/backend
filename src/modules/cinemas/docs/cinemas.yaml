/cinemas:
    get:
        summary: Obtener lista de sucursales
        description: Retorna todas las sucursales activas (paginadas). Requiere autenticación.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: page
              in: query
              schema:
                  type: integer
                  default: 1
              description: Número de página
            - name: limit
              in: query
              schema:
                  type: integer
                  default: 10
              description: Cantidad de registros por página
        responses:
            '200':
                description: Lista de sucursales
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Operation completed successfully
                                data:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/Cinema'
                                metadata:
                                    type: object
                                    properties:
                                        total:
                                            type: integer
                                        per_page:
                                            type: integer
                                        current_page:
                                            type: integer
                                        total_pages:
                                            type: integer
                                        next_page:
                                            type: integer
                                            nullable: true
                                        prev_page:
                                            type: integer
                                            nullable: true
            '401':
                description: No autorizado (token inválido o faltante)
            '500':
                description: Error interno del servidor

    post:
        summary: Crear una nueva sucursal
        description: Registra una nueva sucursal en el sistema. Requiere rol de administrador (`SUPER_ADMIN` o `CINEMA_MANAGER`).
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - openingTime
                            - closingTime
                        properties:
                            name:
                                type: string
                                description: Nombre único de la sucursal
                            address:
                                type: string
                                description: Dirección física
                            phone:
                                type: string
                                description: Número de teléfono de contacto
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '10:00'
                                description: Hora de apertura (formato HH:MM)
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '22:00'
                                description: Hora de cierre (formato HH:MM)
        responses:
            '201':
                description: Sucursal creada exitosamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Sucursal registrada exitosamente
                                data:
                                    $ref: '#/components/schemas/Cinema'
            '400':
                description: Error de validación (formato de hora incorrecto, horario inconsistente, nombre duplicado, etc.)
            '401':
                description: No autorizado
            '403':
                description: No tiene permisos para realizar esta acción
            '500':
                description: Error interno

/cinemas/{id}:
    get:
        summary: Obtener una sucursal por ID
        description: Retorna los detalles de una sucursal específica. Requiere autenticación.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la sucursal
        responses:
            '200':
                description: Sucursal encontrada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    $ref: '#/components/schemas/Cinema'
            '401':
                description: No autorizado
            '404':
                description: Sucursal no encontrada
            '500':
                description: Error interno

    put:
        summary: Actualizar una sucursal
        description: Modifica los datos de una sucursal existente. Requiere rol de administrador.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        responses:
            '200':
                description: Sucursal actualizada
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    $ref: '#/components/schemas/Cinema'
            '400':
                description: Error de validación
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Sucursal no encontrada
            '500':
                description: Error interno

    delete:
        summary: Eliminar una sucursal (soft delete)
        description: Marca la sucursal como eliminada (status=4). No se puede eliminar si tiene salas activas. Requiere rol `SUPER_ADMIN`.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Sucursal eliminada lógicamente
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        deleted:
                                            type: boolean
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes (se requiere SUPER_ADMIN)
            '404':
                description: Sucursal no encontrada
            '409':
                description: Conflicto - la sucursal tiene salas activas
            '500':
                description: Error interno

/cinemas/{cinemaId}/rooms:
    get:
        summary: Listar salas de una sucursal
        description: Retorna todas las salas activas pertenecientes a la sucursal especificada. Requiere autenticación.
        tags:
            - Rooms (anidado)
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
              description: ID de la sucursal
            - name: page
              in: query
              schema:
                  type: integer
            - name: limit
              in: query
              schema:
                  type: integer
        responses:
            '200':
                description: Lista de salas
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                data:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/Room'
                                metadata:
                                    type: object
            '401':
                description: No autorizado
            '404':
                description: Sucursal no encontrada
            '500':
                description: Error interno

    post:
        summary: Crear una nueva sala dentro de una sucursal
        description: Registra una sala sin generar asientos automáticamente. Requiere rol de administrador.
        tags:
            - Rooms (anidado)
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - projectionTypes
                            - gridRows
                            - gridColumns
                            - totalCapacity
                        properties:
                            name:
                                type: string
                            projectionTypes:
                                type: array
                                items:
                                    type: integer
                                description: IDs de tipos de proyección (ej. 1=2D, 2=3D, 3=IMAX)
                            gridRows:
                                type: integer
                                minimum: 1
                                maximum: 50
                            gridColumns:
                                type: integer
                                minimum: 1
                                maximum: 50
                            totalCapacity:
                                type: integer
                                minimum: 0
        responses:
            '201':
                description: Sala creada (pendiente de configurar asientos)
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                message:
                                    type: string
                                data:
                                    type: object
                                    properties:
                                        room_id:
                                            type: integer
                                        name:
                                            type: string
            '400':
                description: Error de validación (campos faltantes, duplicado, etc.)
            '401':
                description: No autorizado
            '403':
                description: Permisos insuficientes
            '404':
                description: Sucursal no encontrada
            '500':
                description: Error interno

components:
    schemas:
        Cinema:
            type: object
            properties:
                id:
                    type: integer
                name:
                    type: string
                address:
                    type: string
                    nullable: true
                phone:
                    type: string
                    nullable: true
                opening_time:
                    type: string
                    example: '10:00:00'
                closing_time:
                    type: string
                    example: '22:00:00'
                status:
                    type: integer
                    description: 1=Activo, 4=Eliminado
                _Status:
                    type: object
                    properties:
                        description:
                            type: string
        Room:
            type: object
            properties:
                id:
                    type: integer
                cinema:
                    type: integer
                name:
                    type: string
                grid_rows:
                    type: integer
                grid_columns:
                    type: integer
                total_capacity:
                    type: integer
                status:
                    type: integer
                _Cinema:
                    type: object
                    properties:
                        name:
                            type: string
                _RoomProjectionTypes:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: integer
                            projection_type:
                                type: integer
                            _ProjectionType:
                                type: object
                                properties:
                                    description:
                                        type: string

    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
