/cinemas:
    get:
        summary: List All Cinemas
        description: Public endpoint. Returns all cinemas.
        tags:
            - Cinemas
        responses:
            '200':
                description: A list of cinemas
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            id:
                                                type: integer
                                            name:
                                                type: string
                                            address:
                                                type: string
                                            phone:
                                                type: string
                                            opening_time:
                                                type: string
                                            closing_time:
                                                type: string
            '500':
                description: Internal server error
    post:
        summary: Create Cinema
        description: Register a new cinema. Requires general management role.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - name
                            - openingTime
                            - closingTime
                        properties:
                            name:
                                type: string
                                example: Cinex Norte
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '09:00'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                                example: '23:00'
        responses:
            '201':
                description: Cinema created
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '409':
                description: Duplicate name
            '500':
                description: Internal server error
    patch:
        summary: Update Own Cinema (Implicit Context)
        description: Update the operating policies (phone, schedules) of the cinema assigned to the authenticated user. The cinema ID is taken from the JWT.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        responses:
            '200':
                description: Cinema updated
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '500':
                description: Internal server error

/cinemas/{id}:
    get:
        summary: Get Cinema By Id
        description: Public endpoint. Returns a specific cinema.
        tags:
            - Cinemas
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: A cinema object
            '404':
                description: Not found
            '500':
                description: Internal server error
    patch:
        summary: Update Cinema
        description: Update any cinema. Requires general management role.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        responses:
            '200':
                description: Cinema updated
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: Not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Cinema
        description: Delete a cinema (soft delete). Requires general management role.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Cinema deleted
            '401':
                description: Unauthorized
            '404':
                description: Not found
            '500':
                description: Internal server error

/cinemas/{cinemaId}/employees:
    get:
        summary: Get Cinema Employees
        description: List all employees in a specific cinema.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: A list of employees
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Employee in Cinema
        description: Register a new employee and associate them with the cinema.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - documentNumber
                            - firstName
                            - lastName
                            - employeeCode
                            - jobPosition
                            - startDate
                        properties:
                            documentNumber:
                                type: string
                            firstName:
                                type: string
                            lastName:
                                type: string
                            employeeCode:
                                type: string
                            jobPosition:
                                type: integer
                            startDate:
                                type: string
                                format: date
                            salaryBase:
                                type: number
                            email:
                                type: string
                                format: email
                            phoneNumber:
                                type: string
                            password:
                                type: string
                            role:
                                type: integer
        responses:
            '201':
                description: Employee created
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '500':
                description: Internal server error

/cinemas/{cinemaId}/employees/{employeeId}:
    delete:
        summary: Remove Employee from Cinema
        description: Deactivate an employee.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
            - name: employeeId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee deactivated
            '401':
                description: Unauthorized
            '404':
                description: Not found
            '500':
                description: Internal server error
