/cinemas/{id}:
    get:
        summary: Get Cinema by ID
        description: Public endpoint. Returns a single cinema.
        tags:
            - Cinemas
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Cinema found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Sucursal obtenida exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        address:
                                            type: string
                                        phone:
                                            type: string
                                        opening_time:
                                            type: string
                                        closing_time:
                                            type: string
                                metadata:
                                    type: object
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
    patch:
        summary: Update Cinema (Explicit Context)
        description: Full update of a cinema by general management. All fields can be modified.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        responses:
            '200':
                description: Cinema updated
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Sucursal actualizada exitosamente
                                data:
                                    nullable: true
                                metadata:
                                    type: object
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
    delete:
        summary: Delete Cinema
        description: Soft‑delete a cinema. Fails if the cinema has active rooms.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Cinema deleted
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Sucursal eliminada exitosamente
                                data:
                                    nullable: true
                                metadata:
                                    type: object
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '409':
                description: Conflict – cinema has active rooms
            '500':
                description: Internal server error
