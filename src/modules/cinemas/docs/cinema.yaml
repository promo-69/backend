/cinemas/{id}:
    get:
        summary: Get Cinema by ID
        description: Public endpoint. Returns a single cinema.
        tags:
            - Cinemas
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Cinema found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        name:
                                            type: string
                                        address:
                                            type: string
                                        phone:
                                            type: string
                                        opening_time:
                                            type: string
                                        closing_time:
                                            type: string
                                        active:
                                            type: boolean
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
    put:
        summary: Update Cinema (General Management)
        description: Full update of a cinema. Requires admin role. Can modify name, address, phone and schedules.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            address:
                                type: string
                            phone:
                                type: string
                            openingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                            closingTime:
                                type: string
                                pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        responses:
            '200':
                description: Cinema updated
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
    patch:
        summary: Set Cinema Status
        description: Activates or deactivates a cinema. Replaces the former DELETE endpoint.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - active
                        properties:
                            active:
                                type: boolean
        responses:
            '200':
                description: Status changed
            '401':
                description: Unauthorized
            '404':
                description: Cinema not found
            '500':
                description: Internal server error
