/cinemas/{cinemaId}/employees:
    get:
        summary: List Employees in a Cinema
        description: Returns all employees with an active position in the specified cinema. Explicit context for general management.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: List of employees
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Empleados obtenidos exitosamente
                                data:
                                    type: object
                                    properties:
                                        rows:
                                            type: array
                                            items:
                                                type: object
                                        count:
                                            type: integer
                                metadata:
                                    type: object
            '401':
                description: Unauthorized
            '500':
                description: Internal server error
    post:
        summary: Create Employee in a Cinema
        description: Creates a new employee and assigns them directly to the specified cinema. Explicit context for general management.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - documentNumber
                            - firstName
                            - lastName
                            - employeeCode
                            - jobPosition
                            - startDate
                        properties:
                            documentNumber:
                                type: string
                            firstName:
                                type: string
                            lastName:
                                type: string
                            employeeCode:
                                type: string
                            jobPosition:
                                type: integer
                            startDate:
                                type: string
                                format: date
                            salaryBase:
                                type: number
                            email:
                                type: string
                            password:
                                type: string
                            gender:
                                type: integer
                            phoneNumber:
                                type: string
                            birthDate:
                                type: string
                                format: date
        responses:
            '201':
                description: Employee created
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Empleado creado exitosamente
                                data:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                        person:
                                            type: integer
                                        employee_code:
                                            type: string
                                metadata:
                                    type: object
            '400':
                description: Validation error
            '401':
                description: Unauthorized
            '500':
                description: Internal server error

/cinemas/{cinemaId}/employees/{employeeId}:
    delete:
        summary: Remove Employee from Cinema
        description: Soft‑deletes an employee and closes their active position in the specified cinema.
        tags:
            - Cinemas
        security:
            - bearerAuth: []
        parameters:
            - name: cinemaId
              in: path
              required: true
              schema:
                  type: integer
            - name: employeeId
              in: path
              required: true
              schema:
                  type: integer
        responses:
            '200':
                description: Employee deactivated
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                success:
                                    type: boolean
                                    example: true
                                message:
                                    type: string
                                    example: Empleado desactivado exitosamente
                                data:
                                    nullable: true
                                metadata:
                                    type: object
            '401':
                description: Unauthorized
            '404':
                description: Employee not found
            '500':
                description: Internal server error
